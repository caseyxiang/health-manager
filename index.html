  <script>
    // 移动Safari CDN加载检测
    (function() {
      const requiredLibs = ['React', 'ReactDOM', 'Babel'];
      const loadStatus = {};
      
      // 检测函数
      function checkLibs() {
        loadStatus.React = typeof React !== 'undefined';
        loadStatus.ReactDOM = typeof ReactDOM !== 'undefined';  
        loadStatus.Babel = typeof Babel !== 'undefined';
        
        const allLoaded = loadStatus.React && loadStatus.ReactDOM && loadStatus.Babel;
        
        if (!allLoaded) {
          console.error('CDN加载失败:', loadStatus);
          // 显示友好错误
          document.body.innerHTML = `
            <div style="padding:20px;background:#dc2626;color:white;font-family:sans-serif;">
              <h3>⚠️ 库加载失败</h3>
              <p>可能的原因:</p>
              <ul style="text-align:left;font-size:14px;">
                <li>网络连接问题</li>
                <li>CDN被拦截</li>
                <li>浏览器版本过低</li>
              </ul>
              <pre style="background:rgba(0,0,0,0.3);padding:10px;border-radius:5px;font-size:12px;overflow-x:auto;">
React: ${loadStatus.React ? '✓' : '✗'}
ReactDOM: ${loadStatus.ReactDOM ? '✓' : '✗'}
Babel: ${loadStatus.Babel ? '✓' : '✗'}
              </pre>
              <p style="font-size:12px;margin-top:15px;">浏览器: ${navigator.userAgent}</p>
            </div>
          `;
        }
      }
      
      // 延迟检测,给CDN一些加载时间
      setTimeout(checkLibs, 1500);
    })();
  </script>

  <script>
    // 检测是否在PWA模式(standalone)
    (function() {
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches 
        || window.navigator.standalone 
        || document.referrer.includes('android-app://');
      
      const isSafari = /Safari/.test(navigator.userAgent) && !/Chrome/.test(navigator.userAgent);
      const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
      
      // 检查是否已经显示过提示
      const hasSeenPrompt = sessionStorage.getItem('pwa-prompt-seen');
      
      if (!isStandalone && isSafari && isIOS && !hasSeenPrompt) {
        // 不在PWA模式,且是iOS Safari,显示提示
        setTimeout(function() {
          const prompt = document.getElementById('pwa-prompt');
          if (prompt) {
            prompt.style.display = 'block';
            sessionStorage.setItem('pwa-prompt-seen', 'true');
          }
        }, 1000);
      }
      
      console.log('运行模式:', {
        isStandalone: isStandalone,
        isSafari: isSafari,
        isIOS: isIOS,
        userAgent: navigator.userAgent
      });
    })();
  </script>

    function cleanIndicatorName(name) {
      if (!name) return '';
      let cleaned = name;
      cleaned = cleaned.replace(/测定/g, '');
      const preserveSerum = ['血清白蛋白', '血清球蛋白', '血清总蛋白'];
      const hasPreserve = preserveSerum.some(term => cleaned.includes(term));
      if (!hasPreserve) {
        cleaned = cleaned.replace(/^血清\s*/, '');
      }
      return cleaned.trim();
    }

    function calculateFlag(result, refRange) {
      if (!result || !refRange) return 'Normal';
      const valMatch = result.toString().match(/-?\d+(?:\.\d+)?/);
      if (!valMatch) return 'Normal';
      const val = parseFloat(valMatch[0]);
      let cleanRange = refRange.toString()
        .replace(/[\u2013\u2014\u2212~~]/g, '-')
        .replace(/-+/g, '-')
        .replace(/[^\d.\-><]/g, '');
      
      if (cleanRange.includes('-')) {
        const parts = cleanRange.split('-').map(s => parseFloat(s.trim()));
        if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
          if (val < parts[0]) return 'Low';
          if (val > parts[1]) return 'High';
          return 'Normal';
        }
      }
      if (cleanRange.startsWith('<')) {
        const max = parseFloat(cleanRange.substring(1));
        if (!isNaN(max) && val > max) return 'High';
        return 'Normal';
      }
      if (cleanRange.startsWith('>')) {
        const min = parseFloat(cleanRange.substring(1));
        if (!isNaN(min) && val < min) return 'Low';
        return 'Normal';
      }
      return 'Normal';
    }

    
    // 医学指标词典匹配和管理函数
    
    // 标准化指标名称:去除空格、括号内容等
    function normalizeIndicatorName(name) {
      if (!name) return '';
      return name.trim()
        .replace(/\s+/g, '')  // 移除所有空格
        .replace(/\([^)]*\)/g, '')  // 移除括号及内容
        .toLowerCase();  // 转小写(用于英文匹配)
    }
    
    // 在词典中查找匹配项
    function findDictionaryMatch(newItem, dictionary) {
      const newCn = newItem.name || '';
      const newEn = (newItem.name.match(/[A-Za-z]/g) || []).join('');  // 提取英文部分
      
      // 步骤1: 如果新数据有英文,优先匹配英文
      if (newEn) {
        const normalizedNewEn = normalizeIndicatorName(newEn);
        for (const entry of dictionary) {
          // 检查主名称
          if (entry.enName && normalizeIndicatorName(entry.enName) === normalizedNewEn) {
            return { match: entry, matchType: 'en-main' };
          }
          // 检查别称
          if (entry.enAliases) {
            for (const alias of entry.enAliases) {
              if (normalizeIndicatorName(alias) === normalizedNewEn) {
                return { match: entry, matchType: 'en-alias' };
              }
            }
          }
        }
      }
      
      // 步骤2: 英文未匹配,尝试匹配中文
      if (newCn) {
        const normalizedNewCn = normalizeIndicatorName(newCn);
        for (const entry of dictionary) {
          // 检查主名称
          if (entry.cnName && normalizeIndicatorName(entry.cnName) === normalizedNewCn) {
            return { match: entry, matchType: 'cn-main' };
          }
          // 检查别称
          if (entry.cnAliases) {
            for (const alias of entry.cnAliases) {
              if (normalizeIndicatorName(alias) === normalizedNewCn) {
                return { match: entry, matchType: 'cn-alias' };
              }
            }
          }
        }
      }
      
      return null;  // 未找到匹配
    }
    
    // 应用词典标准化到检验报告项目
    function applyDictionaryToLabItem(item, dictionary) {
      const matchResult = findDictionaryMatch(item, dictionary);
      
      if (!matchResult) {
        // 未匹配:返回原始数据,不添加到词典
        return { ...item };
      }
      
      const { match, matchType } = matchResult;
      
      // 根据匹配类型标准化名称
      const standardizedItem = { ...item };
      
      if (matchType.startsWith('en-')) {
        // 英文匹配:使用词典的中文名称
        standardizedItem.name = match.cnName;
      } else if (matchType.startsWith('cn-')) {
        // 中文匹配:如果词典有英文,可以添加到显示中
        standardizedItem.name = match.cnName;
        if (match.enName) {
          standardizedItem.displayName = `${match.cnName} (${match.enName})`;
        }
      }
      
      // 补充单位和参考范围(如果词典有而原数据没有)
      if (!standardizedItem.unit && match.unit) {
        standardizedItem.unit = match.unit;
      }
      if (!standardizedItem.refRange && match.normalRange) {
        standardizedItem.refRange = match.normalRange;
      }
      
      standardizedItem.dictionaryId = match.id;
      standardizedItem.description = match.description;
      
      return standardizedItem;
    }
    
    // 批量应用词典到检验报告
    function applyDictionaryToLabReport(report, dictionary) {
      const processedItems = report.items.map(item =>

      );

        ...report,
        items: processedItems
      };
    }

    const TrendChart = ({ datasets, dateRange }) => {
      if (!datasets?.length) return <div className="h-48 flex items-center justify-center text-gray-400 text-xs bg-gray-50 rounded-xl border border-dashed">请选择指标</div>;
      let allPoints = [];
      datasets.forEach((ds, i) => {
        ds.points.forEach(p => {
          if (p.dateStr >= dateRange.start && p.dateStr <= dateRange.end) {
            allPoints.push({ ...p, color: CHART_COLORS[i % CHART_COLORS.length] });
          }
        });
      });
      if (!allPoints.length) return <div className="h-48 flex items-center justify-center text-gray-400 text-xs bg-gray-50 rounded-xl border border-dashed">该时间段内无数据</div>;
      const uniqueDates = [...new Set(allPoints.map(p => p.dateStr))].sort();
      const minVal = Math.min(...allPoints.map(p => p.val));
      const maxVal = Math.max(...allPoints.map(p => p.val));
      let valSpan = maxVal - minVal || 1;
      const yPad = valSpan * 0.2;
      const yMin = minVal - yPad, yMax = maxVal + yPad;
      const W = 300, H = 180, PL = 35, PR = 15, PT = 20, PB = 25;
      const getX = (d) => {
        const idx = uniqueDates.indexOf(d);
        if (uniqueDates.length === 1) return (W - PL - PR) / 2 + PL;
        return PL + (idx / (uniqueDates.length - 1)) * (W - PL - PR);
      };
      const getY = (v) => H - PB - ((v - yMin) / (yMax - yMin)) * (H - PT - PB);
      
      const getVisibleDateLabels = () => {
        const totalDates = uniqueDates.length;
        if (totalDates <= 6) return uniqueDates;
        const step = Math.ceil(totalDates / 6);
        const result = [];
        for (let i = 0; i < totalDates; i += step) {
          result.push(uniqueDates[i]);
        }
        if (result[result.length - 1] !== uniqueDates[totalDates - 1]) {
          result.push(uniqueDates[totalDates - 1]);
        }
        return result;
      };
      const visibleDateLabels = getVisibleDateLabels();
      
      return (
        <div className="w-full">
          <svg width="100%" viewBox={`0 0 ${W} ${H}`}>
            {[0,1,2,3].map(i => {
              const y = PT + i * (H - PT - PB) / 3;
              const val = yMax - (i / 3) * (yMax - yMin);
              return <g key={i}><line x1={PL} y1={y} x2={W-PR} y2={y} stroke="#e5e7eb" strokeDasharray="3"/><text x={PL-4} y={y+3} textAnchor="end" fontSize="8" fill="#9ca3af">{val.toFixed(1)}</text></g>;
            })}
            {visibleDateLabels.map((d, i) => <text key={i} x={getX(d)} y={H-8} textAnchor="middle" fontSize="8" fill="#6b7280">{d.slice(5)}</text>)}
            {datasets.map((ds, i) => {
              const color = CHART_COLORS[i % CHART_COLORS.length];
              const sorted = ds.points.filter(p => p.dateStr >= dateRange.start && p.dateStr <= dateRange.end).sort((a,b) => a.dateStr.localeCompare(b.dateStr));
              if (!sorted.length) return null;
              const pathD = sorted.map((p, idx) => `${idx===0?'M':'L'} ${getX(p.dateStr)} ${getY(p.val)}`).join(' ');
              return (
                <g key={i}>
                  {sorted.length > 1 && <path d={pathD} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"/>}
                  {sorted.map((p, idx) => {
                    const isAbnormal = p.original.flag === 'High' || p.original.flag === 'Low';
                    const dotColor = isAbnormal ? (p.original.flag === 'High' ? '#f97316' : '#fb923c') : color;

    // 健康指标迷你图表组件
    const VitalMiniChart = ({ data, color }) => {
      if (!data || data.length < 2) return null;
      const values = data.map(d => parseFloat(d.value1)).filter(v => !isNaN(v));
      if (values.length < 2) return null;
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = max - min || 1;
      const W = 60, H = 24, P = 2;
      const points = values.slice(-7).map((v, i, arr) => {
        const x = P + (i / (arr.length - 1)) * (W - 2*P);
        const y = H - P - ((v - min) / range) * (H - 2*P);
        return `${x},${y}`;
      }).join(' ');
      return (
        <svg width={W} height={H} className="opacity-60">
          <polyline points={points} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      );
    };

    
    // 健康指标趋势图组件
    const VitalTrendChart = ({ data, type, showDays = 30 }) => {
      if (!data || data.length < 2) {
        return (
          <div className="h-40 flex items-center justify-center text-gray-400 text-xs bg-gray-50 rounded-xl border border-dashed">
            数据不足,无法显示趋势图
          </div>
        );
      }
      
      const sortedData = [...data].sort((a, b) => {
        const dateA = `${a.date} ${a.time}`;
        const dateB = `${b.date} ${b.time}`;
        return dateA.localeCompare(dateB);
      });
      
      const cutoffDate = new Date();
      cutoffDate.setDate(cutoffDate.getDate() - showDays);
      const filteredData = sortedData.filter(d => new Date(d.date) >= cutoffDate);
      
      if (filteredData.length < 2) {
        return (
          <div className="h-40 flex items-center justify-center text-gray-400 text-xs bg-gray-50 rounded-xl border border-dashed">
            近{showDays}天内数据不足
          </div>
        );
      }
      
      const values1 = filteredData.map(d => parseFloat(d.value1)).filter(v => !isNaN(v));
      const values2 = type.hasTwo ? filteredData.map(d => parseFloat(d.value2)).filter(v => !isNaN(v)) : [];
      const allValues = type.hasTwo ? [...values1, ...values2] : values1;
      
      const minVal = Math.min(...allValues);
      const maxVal = Math.max(...allValues);
      const valSpan = maxVal - minVal || 1;
      const yPad = valSpan * 0.15;
      const yMin = minVal - yPad;
      const yMax = maxVal + yPad;
      
      const W = 300, H = 160, PL = 40, PR = 15, PT = 20, PB = 30;
      const uniqueDates = [...new Set(filteredData.map(d => d.date))];
      
      const getX = (idx) => {
        if (filteredData.length === 1) return (W - PL - PR) / 2 + PL;
        return PL + (idx / (filteredData.length - 1)) * (W - PL - PR);
      };
      const getY = (v) => H - PB - ((v - yMin) / (yMax - yMin)) * (H - PT - PB);
      
      const pathD1 = filteredData.map((d, idx) => {
        const v = parseFloat(d.value1);
        if (isNaN(v)) return '';
        return `${idx === 0 ? 'M' : 'L'} ${getX(idx)} ${getY(v)}`;
      }).filter(Boolean).join(' ');
      
      const pathD2 = type.hasTwo ? filteredData.map((d, idx) => {
        const v = parseFloat(d.value2);
        if (isNaN(v)) return '';
        return `${idx === 0 ? 'M' : 'L'} ${getX(idx)} ${getY(v)}`;
      }).filter(Boolean).join(' ') : '';
      
      const visibleDateLabels = uniqueDates.length <= 5 ? uniqueDates : 
        [uniqueDates[0], uniqueDates[Math.floor(uniqueDates.length/2)], uniqueDates[uniqueDates.length - 1]];
      
      let refLines = [];
      if (type.normalRange && type.normalRange !== '-') {
        const rangeMatch = type.normalRange.match(/(\d+(?:\.\d+)?)\s*[-~]\s*(\d+(?:\.\d+)?)/);
        if (rangeMatch) {
          const refMin = parseFloat(rangeMatch[1]);
          const refMax = parseFloat(rangeMatch[2]);
          if (!isNaN(refMin) && refMin >= yMin && refMin <= yMax) refLines.push({ val: refMin });
          if (!isNaN(refMax) && refMax >= yMin && refMax <= yMax) refLines.push({ val: refMax });
        }
      }
      
      return (
        <div className="bg-white p-4 rounded-xl shadow-sm border">
          <div className="flex items-center justify-between mb-3">
            <h4 className="text-xs font-bold text-gray-500 flex items-center gap-1">
              <Icons.BarChart2 size={14} style={{ color: type.color }} /> 趋势图
            </h4>
            <span className="text-xs text-gray-400">近{showDays}天</span>
          </div>
          <svg width="100%" viewBox={`0 0 ${W} ${H}`}>
            {[0,1,2,3,4].map(i => {
              const y = PT + i * (H - PT - PB) / 4;
              const val = yMax - (i / 4) * (yMax - yMin);
              return (<g key={i}><line x1={PL} y1={y} x2={W-PR} y2={y} stroke="#f1f5f9" strokeWidth="1"/><text x={PL-4} y={y+3} textAnchor="end" fontSize="9" fill="#94a3b8">{val.toFixed(1)}</text></g>);
            })}
            {refLines.map((ref, idx) => (<line key={idx} x1={PL} y1={getY(ref.val)} x2={W-PR} y2={getY(ref.val)} stroke="#10b981" strokeWidth="1" strokeDasharray="4,2" opacity="0.6"/>))}
            {visibleDateLabels.map((d, i) => {
              const dataIdx = filteredData.findIndex(fd => fd.date === d);
              if (dataIdx === -1) return null;
              return (<text key={i} x={getX(dataIdx)} y={H-10} textAnchor="middle" fontSize="9" fill="#6b7280">{d.slice(5)}</text>);
            })}
            {pathD1 && (<><path d={pathD1} fill="none" stroke={type.color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>{filteredData.map((d, idx) => {const v = parseFloat(d.value1);if (isNaN(v)) return null;return (<g key={idx}><circle cx={getX(idx)} cy={getY(v)} r={4} fill="white" stroke={type.color} strokeWidth="2"/>{(idx === 0 || idx === filteredData.length - 1) && (<text x={getX(idx)} y={getY(v) - 8} textAnchor="middle" fontSize="10" fontWeight="bold" fill={type.color}>{v}</text>)}</g>);})}</>)}
            {type.hasTwo && pathD2 && (<><path d={pathD2} fill="none" stroke="#f97316" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="4,2"/>{filteredData.map((d, idx) => {const v = parseFloat(d.value2);if (isNaN(v)) return null;return (<g key={idx}><circle cx={getX(idx)} cy={getY(v)} r={3} fill="#f97316"/>{(idx === 0 || idx === filteredData.length - 1) && (<text x={getX(idx)} y={getY(v) + 14} textAnchor="middle" fontSize="9" fill="#f97316">{v}</text>)}</g>);})}</>)}
          </svg>
          {type.hasTwo && (<div className="flex gap-4 justify-center mt-2 text-xs"><div className="flex items-center gap-1"><div className="w-3 h-0.5 rounded" style={{ backgroundColor: type.color }}/><span className="text-gray-500">{type.label1}</span></div><div className="flex items-center gap-1"><div className="w-3 h-0.5 rounded bg-orange-500"/><span className="text-gray-500">{type.label2}</span></div></div>)}
        </div>
      );
    };

const MedicationGantt = ({ meds, dateRange, selectedMeds }) => {
      if (!meds || meds.length === 0) return null;
      const W = 300, ROW_H = 28, PAD_L = 35, PAD_R = 15, PAD_T = 10;
      const startTs = new Date(dateRange.start).getTime();
      const endTs = new Date(dateRange.end).getTime();
      const totalDuration = endTs - startTs;
      if (totalDuration <= 0) return null;
      const getX = (ts) => PAD_L + ((ts - startTs) / totalDuration) * (W - PAD_L - PAD_R);
      
      const medsToShow = selectedMeds && selectedMeds.length > 0 
        ? meds.filter(m => selectedMeds.includes(m.id))
        : meds;
      
      const visibleMeds = medsToShow.filter(m => {
        const mStart = new Date(m.startTime).getTime();
        const mEnd = m.endTime ? new Date(m.endTime).getTime() : endTs;
        return mStart <= endTs && mEnd >= startTs;
      });
      if (visibleMeds.length === 0) return <div className="h-20 flex items-center justify-center text-xs text-gray-400 border border-dashed rounded-xl mt-3">该时间段内无用药记录</div>;
      const totalH = visibleMeds.length * ROW_H + PAD_T + 30;
      return (
        <div className="bg-white p-4 rounded-xl shadow-sm border border-indigo-50 mt-4">
          <h4 className="text-xs font-bold text-gray-400 mb-3 flex items-center gap-1"><Icons.Clock size={14} className="text-indigo-500"/> 同期用药记录</h4>
          <svg width="100%" viewBox={`0 0 ${W} ${totalH}`} className="overflow-visible">
            <defs><filter id="medShadow"><feDropShadow dx="0" dy="1" stdDeviation="1" floodOpacity="0.15"/></filter></defs>
            <line x1={PAD_L} y1={PAD_T} x2={PAD_L} y2={totalH - 20} stroke="#cbd5e1" strokeWidth="1.5"/>
            {visibleMeds.map((m, i) => {
              const mStartTs = new Date(m.startTime).getTime();
              const mEndTs = m.endTime ? new Date(m.endTime).getTime() : endTs;
              const drawStart = Math.max(startTs, mStartTs);
              const drawEnd = Math.min(endTs, mEndTs);
              if (drawEnd < drawStart) return null;
              const isActive = !m.endTime || new Date(m.endTime) >= new Date();
              return (
                <g key={m.id}>
                  <circle cx={2} cy={i * ROW_H + PAD_T + 12 + 6} r="2.5" fill={isActive ? "#10b981" : "#94a3b8"}/>
                  <rect x={getX(drawStart)} y={i * ROW_H + PAD_T + 12} width={Math.max(3, getX(drawEnd) - getX(drawStart))} height={14} rx={7} fill="#6366f1" opacity="0.85" filter="url(#medShadow)"/>
                  <text x={8} y={i * ROW_H + PAD_T + 12 - 3} fontSize="9" fill="#334155" fontWeight="600">{m.name}</text>
                </g>
              );
            })}
            <text x={PAD_L} y={totalH - 5} textAnchor="start" fontSize="9" fill="#94a3b8" fontWeight="500">{dateRange.start}</text>
            <text x={W - PAD_R} y={totalH - 5} textAnchor="end" fontSize="9" fill="#94a3b8" fontWeight="500">{dateRange.end}</text>
          </svg>
        </div>
      );
    };

          const localMeds = loadMemberData('default', 'meds', [], userId);
          
          // 简单判断：如果有数据就认为有修改（更精确的方式需要记录每次操作的时间戳）
          return localMembers.length > 1 || localMeds.length > 0;
        } catch (e) {

        }
      };
      
      
      // 撤销自动同步（恢复本地备份）
      // 处理数据冲突 - 使用云端数据
      const resolveConflictWithCloud = async () => {
        if (!conflictData) return;
        
        setShowDataConflict(false);
        setIsLoadingUserData(true);
        
        try {
          await applyCloudData(conflictData);
          localStorage.setItem('health_pro_last_sync_time', conflictData.lastUpdated);

        } catch (e) {
          console.error('❌ [resolveConflictWithCloud] 应用云端数据失败:', e);
          alert('❌ 数据恢复失败');
        } finally {
          setIsLoadingUserData(false);
          setConflictData(null);
        }
      };
      
      // 处理数据冲突 - 使用本地数据
      const resolveConflictWithLocal = async () => {
        setShowDataConflict(false);
        setIsLoadingUserData(true);
        
        try {
          // 直接上传本地数据到云端
          await saveToCloud(currentUser.objectId, sessionToken, false);
          localStorage.setItem('health_pro_last_sync_time', new Date().toISOString());
          console.log('✅ 已保存本地数据到云端');
        } catch (e) {
          console.error('❌ [resolveConflictWithLocal] 上传本地数据失败:', e);
          alert('❌ 数据上传失败');
        } finally {
          setIsLoadingUserData(false);
          setConflictData(null);
        }
      };
      
      // 退出登录
      const handleLogout = async () => {
        setIsLoggingOut(true);
        
        // 超时保护：3秒后强制退出
        const forceLogoutTimer = setTimeout(() => {
          console.warn('⚠️ [handleLogout] 同步超时，强制退出');
          performLogout();
        }, 3000);
        
        // 退出前先同步到云端（关键：确保数据不丢失）
        if (currentUser && sessionToken && isOnline) {
          setSyncStatus('syncing');
          try {
            await saveToCloud(currentUser.objectId, sessionToken, false);
            console.log('✅ [handleLogout] 退出前同步成功');
          } catch (e) {
            console.error('❌ [handleLogout] 退出前同步失败:', e);
          }
        }
        
        clearTimeout(forceLogoutTimer);
        performLogout();
      };
      
      // 执行退出操作
      const performLogout = () => {
        // 关键修复：清理当前用户的所有localStorage数据
        const userId = getUserId();
        console.log('🧹 [performLogout] 清理用户数据:', userId);
        
        // 收集所有需要删除的key
        const keysToRemove = [];
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          // 清理该用户的所有数据（包括成员数据、API设置等）
          if (key && key.startsWith(`health_pro_${userId}_`)) {
            keysToRemove.push(key);
          }
        }
        
        // 批量删除
        keysToRemove.forEach(key => {
          localStorage.removeItem(key);
          console.log('  🗑️ 删除:', key);
        });
        console.log(`✅ [performLogout] 已清理 ${keysToRemove.length} 项数据`);
        
        // 清理用户凭证

        setSessionToken(null);

        setIsValidatingToken(false); // 修复：重置验证状态

        console.log('✅ [performLogout] 退出登录完成');

      // 从云端加载数据
      const loadFromCloud = async (userId, token, forceOverwrite = false) => {

        if (!isOnline) {

          setSyncStatus('error');
          setLoginLoading(false);
          setDataLoaded(true);
          
          // 关键修复：离线时从localStorage加载数据
          try {
            let loadedMembers = loadData('members', DEFAULT_MEMBERS, userId);
            const hasDefaultMember = loadedMembers.some(m => m.id === 'default');
            if (!hasDefaultMember) {
              loadedMembers = [DEFAULT_MEMBER, ...loadedMembers];
              saveData('members', loadedMembers, userId);
            }
            setMembers(loadedMembers);
            
            const loadedCurrentMemberId = loadData('current_member', 'default', userId);
            setCurrentMemberId(loadedCurrentMemberId);
            
            setMeds(loadMemberData(loadedCurrentMemberId, 'meds', DEFAULT_MEDS, userId));
            setCatalog(loadMemberData(loadedCurrentMemberId, 'catalog', DEFAULT_CATALOG, userId));
            setCheckups(loadMemberData(loadedCurrentMemberId, 'checkups', DEFAULT_CHECKUPS, userId));
            setLabReports(loadMemberData(loadedCurrentMemberId, 'labReports', DEFAULT_LAB_REPORTS, userId));
            setImagingReports(loadMemberData(loadedCurrentMemberId, 'imagingReports', DEFAULT_IMAGING_REPORTS, userId));
            setVitals(loadMemberData(loadedCurrentMemberId, 'vitals', DEFAULT_VITALS, userId));
            setMedicalDictionary(loadData('medical_dictionary', DEFAULT_MEDICAL_DICTIONARY, userId));

            console.error('❌ [loadFromCloud-offline] 加载失败:', err);

          return;
        }
        setSyncStatus('syncing');
        try {
          console.log('🌐 [loadFromCloud] 请求云端数据...');
          const cloudData = await LeanCloud.loadUserData(userId, token);
          console.log('📦 [loadFromCloud] 云端返回:', cloudData ? '有数据' : '无数据');
          if (cloudData) {
            // 直接应用云端数据（不检测冲突）

            await applyCloudData(cloudData);
          } else {
            // 云端无数据，初始化为空（新用户不上传localStorage）
            console.log('🆕 [loadFromCloud] 新用户首次登录，初始化空数据');
            await applyCloudData({
              members: DEFAULT_MEMBERS,
              currentMemberId: 'default',
              memberData: {},
              apiSettings: {},
              medicalDictionary: DEFAULT_MEDICAL_DICTIONARY
            });

            await saveToCloud(userId, token);

          setSyncStatus('synced');
          setLastSyncTime(new Date());
          setLoginLoading(false); // 重要：结束loading
          console.log('✅ [loadFromCloud] 完成');
        } catch (e) {
          console.error('❌ [loadFromCloud] 失败:', e);
          setSyncStatus('error');
          setLoginLoading(false); // 重要：失败时也要结束loading
          setDataLoaded(true);
          
          // 关键修复：失败后从localStorage加载本地数据作为后备
          console.log('🔄 [loadFromCloud] 云端加载失败，从localStorage加载本地数据');
          try {
            // 加载成员列表
            let loadedMembers = loadData('members', DEFAULT_MEMBERS, userId);
            const hasDefaultMember = loadedMembers.some(m => m.id === 'default');

              console.log('⚠️ [loadFromCloud-fallback] 添加默认成员');
              loadedMembers = [DEFAULT_MEMBER, ...loadedMembers];
              saveData('members', loadedMembers, userId);
            }
            setMembers(loadedMembers);
            
            // 加载当前成员ID
            const loadedCurrentMemberId = loadData('current_member', 'default', userId);
            setCurrentMemberId(loadedCurrentMemberId);

            setCatalog(loadMemberData(loadedCurrentMemberId, 'catalog', DEFAULT_CATALOG, userId));
            setCheckups(loadMemberData(loadedCurrentMemberId, 'checkups', DEFAULT_CHECKUPS, userId));
            setLabReports(loadMemberData(loadedCurrentMemberId, 'labReports', DEFAULT_LAB_REPORTS, userId));
            setImagingReports(loadMemberData(loadedCurrentMemberId, 'imagingReports', DEFAULT_IMAGING_REPORTS, userId));

            // 加载医学词典
            setMedicalDictionary(loadData('medical_dictionary', DEFAULT_MEDICAL_DICTIONARY, userId));

          } catch (fallbackError) {
            console.error('❌ [loadFromCloud-fallback] 本地数据加载也失败:', fallbackError);
            // 如果连本地加载都失败，至少初始化为空数据
            setMembers(DEFAULT_MEMBERS);
            setCurrentMemberId('default');
            setMeds([]);
            setCatalog([]);
            setCheckups([]);
            setLabReports([]);
            setImagingReports([]);
            setVitals([]);
            setMedicalDictionary(DEFAULT_MEDICAL_DICTIONARY);
          }
        }
      };
      
      // 保存数据到云端(改进版:更详细的错误处理)
      const saveToCloud = async (userId = currentUser?.objectId, token = sessionToken, showAlert = false) => {
        if (!userId || !token) return;
        if (!isOnline) {
          setSyncStatus('error');
          if (showAlert) alert('⚠️ 网络离线,无法同步到云端');
          return;
        }
        
        console.log('🔄 [saveToCloud] 开始同步到云端...', { userId });

        try {
          // 从当前用户的localStorage读取数据

          console.log('📖 [saveToCloud] 读取到的成员列表:', savedMembers.length, '个:', savedMembers.map(m => m.name));
          
          // 收集所有成员数据
          const memberData = {};
          savedMembers.forEach(member => {
            memberData[member.id] = {
              meds: loadMemberData(member.id, 'meds', [], userId),
              catalog: loadMemberData(member.id, 'catalog', [], userId),
              checkups: loadMemberData(member.id, 'checkups', [], userId),
              labReports: loadMemberData(member.id, 'labReports', [], userId),
              imagingReports: loadMemberData(member.id, 'imagingReports', [], userId),
              vitals: loadMemberData(member.id, 'vitals', [], userId)
            };
          });
          
          // 统计数据量
          let totalItems = 0;
          Object.values(memberData).forEach(data => {
            totalItems += (data.meds?.length || 0) + (data.catalog?.length || 0) + 
                         (data.labReports?.length || 0) + (data.vitals?.length || 0);
          });
          console.log('📊 [saveToCloud] 数据统计:', { 
            成员数: savedMembers.length, 
            总数据项: totalItems 
          });
          
          // 收集API设置（全局，无需隔离）
          const apiSettings = {};
          API_PROVIDERS.forEach(p => {
            const key = 'ai_api_key_' + p.id;
            const val = localStorage.getItem(key);
            if (val) apiSettings[key] = val;
          });
          apiSettings['ai_api_provider'] = localStorage.getItem('ai_api_provider') || 'qwen';
          
          // 读取医学词典
          const savedDictionary = loadData('medical_dictionary', DEFAULT_MEDICAL_DICTIONARY, userId);
          
          // 真正执行保存
          const result = await LeanCloud.saveUserData(userId, token, {
            members: savedMembers,
            currentMemberId: loadData('current_member', 'default', userId),
            memberData,
            apiSettings,
            medicalDictionary: savedDictionary,
            lastUpdated: new Date().toISOString(),
            // 设备管理字段
            deviceId: deviceId,  // 当前设备ID
            lastActiveTime: new Date().toISOString()  // 最后活跃时间
          });
          
          console.log('✅ [saveToCloud] 云端同步成功!', result);
          setSyncStatus('synced');
          setLastSyncTime(new Date());
          // 保存最后同步时间到localStorage
          localStorage.setItem('health_pro_last_sync_time', new Date().toISOString());
          if (showAlert) alert('✅ 数据已成功同步到云端');
        } catch (e) {
          console.error('❌ 云端保存失败:', e);
          setSyncStatus('error');
          
          // 显示详细的错误信息
          let errorMsg = '同步失败';
          if (e.message.includes('网络')) {
            errorMsg = '网络连接失败';
          } else if (e.message.includes('Session token')) {
            errorMsg = '登录已过期,请重新登录';
          } else if (e.message.includes('Forbidden')) {
            errorMsg = '没有权限,请重新登录';
          } else {
            errorMsg = e.message || '未知错误';
          }
          
          if (showAlert) {
            alert(`❌ 同步失败:${errorMsg}\n\n请检查网络连接或稍后重试`);
          }
        }
      };
      
      // 成员列表持久化（带用户隔离）
      useEffect(() => {
        console.log('🔄 [useEffect-persist] members 触发:', members.length, '个成员', members.map(m => m.name));
        saveData('members', members, getUserId()); 
      }, [members, currentUser]);
      
      useEffect(() => { 
        saveData('current_member', currentMemberId, getUserId()); 
      }, [currentMemberId, currentUser]);

      // 数据持久化 Effect（带用户隔离）
      useEffect(() => { 
        // 移除dataLoaded检查，云端加载期间也允许保存新数据
        saveMemberData(currentMemberId, 'meds', meds, getUserId()); 
      }, [meds, currentMemberId, currentUser]);
      
      useEffect(() => { 
        saveMemberData(currentMemberId, 'catalog', catalog, getUserId()); 
      }, [catalog, currentMemberId, currentUser]);
      
      useEffect(() => { 
        saveMemberData(currentMemberId, 'checkups', checkups, getUserId()); 
      }, [checkups, currentMemberId, currentUser]);
      
      useEffect(() => {
        console.log(`🔄 [useEffect-persist] labReports 触发:`, labReports.length, '项');
        saveMemberData(currentMemberId, 'labReports', labReports, getUserId()); 
      }, [labReports, currentMemberId, currentUser]);
      
      useEffect(() => {
        console.log(`🔄 [useEffect-persist] imagingReports 触发:`, imagingReports.length, '项');
        saveMemberData(currentMemberId, 'imagingReports', imagingReports, getUserId()); 
      }, [imagingReports, currentMemberId, currentUser]);
      
      useEffect(() => { 
        saveMemberData(currentMemberId, 'vitals', vitals, getUserId()); 
      }, [vitals, currentMemberId, currentUser]);
      
      // 词典持久化（带用户隔离）
      useEffect(() => { 
        saveData('medical_dictionary', medicalDictionary, getUserId()); 
      }, [medicalDictionary, currentUser]);

      
      // 自动云同步(防抖3秒,更可靠)
      useEffect(() => {
        // 关键修复：只有在数据已加载完成时才触发自动同步，防止空数据覆盖云端
        if (!currentUser || !sessionToken || !isOnline || !dataLoaded) return;
        
        const timer = setTimeout(() => {
          console.log('⏰ 防抖时间到,触发自动同步');
          saveToCloud();
        }, 3000); // 改为3秒,避免频繁触发
        
        return () => {
          console.log('⏰ 防抖计时器被清除');
          clearTimeout(timer);
        };
      }, [meds, catalog, checkups, labReports, imagingReports, vitals, members, medicalDictionary, currentUser, sessionToken, isOnline, dataLoaded]);
      
      // 注释：登录/注册时已手动调用loadFromCloud，此useEffect已废弃
      // useEffect(() => {
      //   if (currentUser && sessionToken && !lastSyncTime) {
      //     loadFromCloud(currentUser.objectId, sessionToken);
      //   }
      // }, [currentUser, sessionToken]);
      
      // 页面关闭前强制同步（改进版：多重保障）
      useEffect(() => {
        if (!currentUser || !sessionToken || !dataLoaded) return;
        
        // 方案1：visibilitychange - 页面即将不可见时提前同步（更可靠）
        const handleVisibilityChange = () => {
          if (document.hidden && dataLoaded) {
            console.log('📴 [visibilitychange] 页面隐藏，立即同步');
            saveToCloud();
          }
        };
        
        // 方案2：beforeunload - 最后的保障
        const handleBeforeUnload = (e) => {
          if (dataLoaded) {
            console.log('🚪 [beforeunload] 页面关闭，尝试同步');
            saveToCloud();
          }
        };
        
        document.addEventListener('visibilitychange', handleVisibilityChange);
        window.addEventListener('beforeunload', handleBeforeUnload);
        
        return () => {
          document.removeEventListener('visibilitychange', handleVisibilityChange);
          window.removeEventListener('beforeunload', handleBeforeUnload);
        };
      }, [currentUser, sessionToken, dataLoaded]);
      
      // 网络状态监听
      useEffect(() => {
        const handleOnline = () => {
          setIsOnline(true);
          // 恢复在线后自动重试同步
          if (currentUser && sessionToken && syncStatus === 'error') {
            saveToCloud();
          }
        };
        const handleOffline = () => {
          setIsOnline(false);
          if (syncStatus === 'syncing') {
            setSyncStatus('error');
          }
        };
        
        window.addEventListener('online', handleOnline);
        window.addEventListener('offline', handleOffline);
        
        return () => {
          window.removeEventListener('online', handleOnline);
          window.removeEventListener('offline', handleOffline);
        };
      }, [currentUser, sessionToken, syncStatus]);
      
      // 启动时验证Token和检测数据冲突
      useEffect(() => {
        const validateAndCheckConflict = async () => {
          if (!currentUser || !sessionToken || !isOnline || isValidatingToken) return;
          
          console.log('🔐 [启动验证] 开始验证Token和检测冲突');
          setIsValidatingToken(true);
          
          try {
            // 1. 验证 Token 是否有效
            const isTokenValid = await validateSessionToken();
            
            if (!isTokenValid) {
              console.error('❌ [启动验证] Token失效，强制退出登录');
              alert('⚠️ 登录已过期\n\n请重新登录');
              performLogout();
              return;
            }
            
            console.log('✅ [启动验证] Token有效');
            
            // 2. 检测数据冲突并自动同步
            const conflictResult = await checkDataConflict();
            
            if (conflictResult) {
              if (conflictResult.autoApplied) {
                // 🎯 方案A：自动应用了云端数据
                console.warn('⚠️ [启动验证] 已自动使用云端数据');
                await applyCloudData(conflictResult.cloudData);
                localStorage.setItem('health_pro_last_sync_time', conflictResult.cloudData.lastUpdated);
                
                // 保存备份数据（用于撤销）
                setLastConflictData(conflictResult);
                
                // 显示通知
                setSyncNotification(conflictResult.notification);
                
                // 5秒后自动关闭通知
                setTimeout(() => setSyncNotification(null), 5000);
              } else if (conflictResult.noConflict) {
                // 只有云端更新，自动应用
                console.log('✅ [启动验证] 云端数据更新，自动应用');
                await applyCloudData(conflictResult.cloudData);
                localStorage.setItem('health_pro_last_sync_time', conflictResult.cloudData.lastUpdated);
                
                // 显示简单通知
                setSyncNotification(conflictResult.notification);
                setTimeout(() => setSyncNotification(null), 3000);
              }
            } else {
              console.log('✅ [启动验证] 无冲突，继续正常流程');
            }
          } catch (e) {
            console.error('❌ [启动验证] 验证失败:', e);
            // 不强制退出，允许离线使用
          } finally {
            setIsValidatingToken(false);
          }
        };
        
        // 延迟500ms执行，避免与其他初始化冲突
        const timer = setTimeout(validateAndCheckConflict, 500);
        return () => clearTimeout(timer);
      }, []); // 只在组件挂载时执行一次
      
      // 设备心跳检测 - 单设备登录限制
      useEffect(() => {
        if (!currentUser || !sessionToken || !isOnline) return;
        
        const checkDeviceStatus = async () => {
          try {
            // 从云端加载用户数据
            const cloudData = await LeanCloud.loadUserData(currentUser.objectId, sessionToken);
            
            if (cloudData && cloudData.deviceId && cloudData.deviceId !== deviceId) {
              // 设备ID不匹配，说明在其他设备登录了
              console.warn('⚠️ [心跳检测] 检测到其他设备登录');
              setIsKickedOut(true);
              setKickedOutReason('您的账号已在其他设备登录');
              
              // 清理本地登录状态
              localStorage.removeItem('health_pro_user');
              localStorage.removeItem('health_pro_session');
              setCurrentUser(null);
              setSessionToken(null);
            }
          } catch (e) {
            console.error('❌ [心跳检测] 失败:', e);
          }
        };
        
        // 首次检查
        checkDeviceStatus();
        
        // 每30秒检查一次
        const interval = setInterval(checkDeviceStatus, 30000);
        
        return () => clearInterval(interval);
      }, [currentUser, sessionToken, deviceId, isOnline]);
      
      // 关闭首次引导
      const dismissWelcomeGuide = () => {
        localStorage.setItem('health_pro_welcomed', 'true');
        setShowWelcomeGuide(false);
      };
      
      // 处理同步冲突 - 使用云端数据
      
      // 新用户快速初始化（无需网络请求）
      const initializeNewUser = (userId) => {
        console.log('🆕 [initializeNewUser] 初始化新用户数据:', userId);
        
        // 直接初始化默认数据到localStorage
        const defaultMembers = DEFAULT_MEMBERS;
        saveData('members', defaultMembers, userId);
        saveData('current_member', 'default', userId);
        
        // 初始化空数据
        saveMemberData('default', 'meds', [], userId);
        saveMemberData('default', 'catalog', [], userId);
        saveMemberData('default', 'checkups', [], userId);
        saveMemberData('default', 'labReports', [], userId);
        saveMemberData('default', 'imagingReports', [], userId);
        saveMemberData('default', 'vitals', [], userId);
        
        // 初始化医学词典
        saveData('medical_dictionary', DEFAULT_MEDICAL_DICTIONARY, userId);
        
        // 更新state（不调用setDataLoaded，避免触发useEffect）
        setMembers(defaultMembers);
        setCurrentMemberId('default');
        setMeds([]);
        setCatalog([]);
        setCheckups([]);
        setLabReports([]);
        setImagingReports([]);
        setVitals([]);
        setMedicalDictionary(DEFAULT_MEDICAL_DICTIONARY);
        
        console.log('✅ [initializeNewUser] 新用户初始化完成（不触发useEffect）');
      };
      
      // 应用云端数据到本地
      const applyCloudData = async (cloudData) => {
        const userId = getUserId();

            } catch (e) {
              if (e.name === 'AbortError') return; // 用户取消
              // 继续尝试其他方法
            }
          }
          
          // 方法2: Web Share API (移动端分享)
          if (navigator.share && navigator.canShare) {
            const file = new File([backupDataStr], backupFileName, { type: 'application/json' });
            if (navigator.canShare({ files: [file] })) {
              try {
                await navigator.share({
                  files: [file],
                  title: '健康管家备份',
                  text: '健康管家数据备份文件'
                });
                setShowBackupModal(false);
                return;
              } catch (e) {
                if (e.name === 'AbortError') return;
                // 继续尝试其他方法
              }
            }
          }
          
          // 方法3: 传统下载方式
          const blob = new Blob([backupDataStr], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = backupFileName;
          link.style.display = 'none';
          document.body.appendChild(link);
          
          // 模拟点击
          if (typeof link.click === 'function') {
            link.click();
          } else {
            // 兼容旧浏览器
            const evt = document.createEvent('MouseEvents');
            evt.initEvent('click', true, true);
            link.dispatchEvent(evt);
          }
          
          // 延迟清理
          setTimeout(() => {
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
          }, 100);
          
          setShowBackupModal(false);
        } catch (err) {
          console.error('下载失败:', err);
          alert('下载出错,请尝试"复制数据"方式保存');
        }
      };
      
      const copyBackupData = () => {
        if (navigator.clipboard && window.isSecureContext) {
          navigator.clipboard.writeText(backupDataStr).then(() => {
            alert('数据已复制到剪贴板!\n\n请粘贴到「备忘录」或「文件」中保存。');
          }).catch(() => {
            fallbackCopy();
          });
        } else {
          fallbackCopy();
        }
      };
      
      const fallbackCopy = () => {
        const textArea = document.createElement('textarea');
        textArea.value = backupDataStr;
        textArea.style.position = 'fixed';
        textArea.style.left = '-9999px';
        document.body.appendChild(textArea);

        } catch (err) {
          alert('复制失败,请手动选择文本');

        document.body.removeChild(textArea);
      };
      


      const handleFileRestore = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            let counts = { meds: 0, catalog: 0, checkups: 0, labs: 0, imaging: 0, vitals: 0, members: 0 };
            
            const userId = getUserId();
            
            // 恢复成员列表和所有成员数据(新版本备份格式)
            if (data.members && data.membersData) {
              // 恢复成员列表
              setMembers(data.members);
              counts.members = data.members.length;
              
              // 恢复每个成员的数据到 localStorage（带用户隔离）
              Object.entries(data.membersData).forEach(([memberId, memberData]) => {
                if (memberData.meds) { saveMemberData(memberId, 'meds', memberData.meds, userId); counts.meds += memberData.meds.length; }
                if (memberData.catalog) { saveMemberData(memberId, 'catalog', memberData.catalog, userId); counts.catalog += memberData.catalog.length; }
                if (memberData.checkups) { saveMemberData(memberId, 'checkups', memberData.checkups, userId); counts.checkups += memberData.checkups.length; }
                if (memberData.labReports) { saveMemberData(memberId, 'labReports', memberData.labReports, userId); counts.labs += memberData.labReports.length; }
                if (memberData.imagingReports) { saveMemberData(memberId, 'imagingReports', memberData.imagingReports, userId); counts.imaging += memberData.imagingReports.length; }
                if (memberData.vitals) { saveMemberData(memberId, 'vitals', memberData.vitals, userId); counts.vitals += memberData.vitals.length; }
              });
              
              // 恢复当前成员ID并加载对应数据
              const targetMemberId = data.currentMemberId || data.members[0]?.id || 'default';
              setCurrentMemberId(targetMemberId);
              const targetData = data.membersData[targetMemberId] || {};
              setMeds(targetData.meds || []);
              setCatalog(targetData.catalog || []);
              setCheckups(targetData.checkups || []);
              setLabReports(targetData.labReports || []);
              setImagingReports(targetData.imagingReports || []);
              setVitals(targetData.vitals || []);
            } else {
              // 兼容旧版本备份格式(只有当前成员数据)
              if (data.meds) { setMeds(data.meds.map(m => ({...m, id: m.id || Date.now() + Math.random().toString()}))); counts.meds = data.meds.length; }
              if (data.catalog) { setCatalog(data.catalog.map(c => ({...c, id: c.id || Date.now() + Math.random().toString()}))); counts.catalog = data.catalog.length; }
              if (data.checkups) { setCheckups(data.checkups.map(c => ({...c, id: c.id || Date.now() + Math.random().toString()}))); counts.checkups = data.checkups.length; }
              if (data.labReports) { setLabReports(data.labReports.map(r => ({...r, id: r.id || Date.now() + Math.random().toString()}))); counts.labs = data.labReports.length; }
              if (data.imagingReports) { setImagingReports(data.imagingReports.map(r => ({...r, id: r.id || Date.now() + Math.random().toString()}))); counts.imaging = data.imagingReports.length; }
              if (data.vitals) { setVitals(data.vitals.map(v => ({...v, id: v.id || Date.now() + Math.random().toString()}))); counts.vitals = data.vitals.length; }
              if (Array.isArray(data) && data[0]?.items) { setLabReports(data.map(r => ({...r, id: r.id || Date.now() + Math.random().toString()}))); counts.labs = data.length; }
            }
            
            // 恢复设置
            if (data.settings) {
              if (data.settings.apiProvider) { 
                localStorage.setItem('ai_api_provider', data.settings.apiProvider); 
                CURRENT_API = data.settings.apiProvider; 
                setApiProvider(data.settings.apiProvider); 
              }
              // 新版本格式:恢复所有服务商的API Key
              if (data.settings.apiKeys) {
                Object.entries(data.settings.apiKeys).forEach(function(entry) {
                  if (entry[1]) saveApiKeyFor(entry[0], entry[1]);
                });
                setApiKeyInput(getApiKeyFor(data.settings.apiProvider || 'qwen'));
              }
              // 兼容旧版本格式:单个API Key
              else if (data.settings.apiKey) {
                var provider = data.settings.apiProvider || 'qwen';
                saveApiKeyFor(provider, data.settings.apiKey);
                setApiKeyInput(data.settings.apiKey);
              }
            }
            
            // 恢复医学指标词典
            if (data.medicalDictionary) {
              setMedicalDictionary(data.medicalDictionary);
            }
            
            setShowRestoreModal(false);
            const membersInfo = counts.members > 0 ? `\n• 家庭成员: ${counts.members}人` : '';
            alert(`数据已导入并覆盖原有数据!${membersInfo}\n• 服药计划: ${counts.meds}条\n• 药品目录: ${counts.catalog}条\n• 预约检查: ${counts.checkups}条\n• 检测报告: ${counts.labs}条\n• 影像报告: ${counts.imaging}条\n• 健康指标: ${counts.vitals}条`);
          } catch (err) {
            console.error('恢复失败:', err);
            alert('文件格式错误,请选择有效的JSON备份文件');
          }
        };
        reader.readAsText(file);
        e.target.value = '';
      };
      
      const handleResetData = () => {

      const handlePrintTrend = () => {
        if (!trendRange.start || !trendRange.end || selectedTrendItems.length === 0) {
          alert('请先选择指标和时间范围');
          return;
        }
        
        // 筛选时间段内的用药
        const rangeStartTs = new Date(trendRange.start).getTime();
        const rangeEndTs = new Date(trendRange.end).getTime();
        const filteredMedsForPrint = meds.filter(function(med) {
          const medStartTs = new Date(med.startTime).getTime();
          const medEndTs = med.endTime ? new Date(med.endTime).getTime() : rangeEndTs;
          return medStartTs <= rangeEndTs && medEndTs >= rangeStartTs;
        }).filter(function(med) {
          return selectedMeds.includes(med.id);
        });

        // 统一尺寸常量
        var CHART_W = 320, CHART_PL = 40, CHART_PR = 15;

        // 生成趋势图SVG
        var trendSvg = '';
        if (trendDatasets && trendDatasets.length > 0) {
          var allPoints = [];
          trendDatasets.forEach(function(ds, i) {
            ds.points.forEach(function(p) {
              if (p.dateStr >= trendRange.start && p.dateStr <= trendRange.end) {
                allPoints.push({ dateStr: p.dateStr, val: p.val, flag: p.original.flag, color: CHART_COLORS[i % CHART_COLORS.length], dsIndex: i });
              }
            });
          });
          
          if (allPoints.length > 0) {
            var uniqueDates = [];
            allPoints.forEach(function(p) {
              if (uniqueDates.indexOf(p.dateStr) === -1) uniqueDates.push(p.dateStr);
            });
            uniqueDates.sort();
            
            var visibleDateLabels = uniqueDates;
            if (uniqueDates.length > 6) {
              var step = Math.ceil(uniqueDates.length / 6);
              visibleDateLabels = [];
              for (var di = 0; di < uniqueDates.length; di += step) {
                visibleDateLabels.push(uniqueDates[di]);
              }
              if (visibleDateLabels[visibleDateLabels.length - 1] !== uniqueDates[uniqueDates.length - 1]) {
                visibleDateLabels.push(uniqueDates[uniqueDates.length - 1]);
              }
            }
            
            var vals = allPoints.map(function(p) { return p.val; });
            var minVal = Math.min.apply(null, vals);
            var maxVal = Math.max.apply(null, vals);
            var valSpan = maxVal - minVal || 1;
            var yPad = valSpan * 0.2;
            var yMin = minVal - yPad, yMax = maxVal + yPad;
            var W = CHART_W, H = 200, PL = CHART_PL, PR = CHART_PR, PT = 25, PB = 35;
            
            var getX = function(d) {
              var idx = uniqueDates.indexOf(d);
              if (uniqueDates.length === 1) return (W - PL - PR) / 2 + PL;
              return PL + (idx / (uniqueDates.length - 1)) * (W - PL - PR);
            };
            var getY = function(v) {
              return H - PB - ((v - yMin) / (yMax - yMin)) * (H - PT - PB);
            };
            
            trendSvg = '<svg width="100%" viewBox="0 0 ' + W + ' ' + H + '" style="max-width:' + W + 'px;display:block;margin:0 auto;">';
            for (var i = 0; i <= 4; i++) {
              var y = PT + i * (H - PT - PB) / 4;
              var val = yMax - (i / 4) * (yMax - yMin);
              trendSvg += '<line x1="' + PL + '" y1="' + y + '" x2="' + (W-PR) + '" y2="' + y + '" stroke="#e5e7eb" stroke-dasharray="2"/>';
              trendSvg += '<text x="' + (PL-4) + '" y="' + (y+3) + '" text-anchor="end" font-size="9" fill="#9ca3af">' + val.toFixed(1) + '</text>';
            }
            visibleDateLabels.forEach(function(d) {
              trendSvg += '<text x="' + getX(d) + '" y="' + (H-12) + '" text-anchor="middle" font-size="8" fill="#6b7280">' + d.slice(5) + '</text>';
            });
            trendDatasets.forEach(function(ds, i) {
              var color = CHART_COLORS[i % CHART_COLORS.length];
              var sorted = [];
              ds.points.forEach(function(p) {
                if (p.dateStr >= trendRange.start && p.dateStr <= trendRange.end) {
                  sorted.push(p);
                }
              });
              sorted.sort(function(a,b) { return a.dateStr.localeCompare(b.dateStr); });
              
              if (sorted.length > 1) {
                var pathD = '';
                sorted.forEach(function(p, idx) {
                  pathD += (idx === 0 ? 'M' : 'L') + ' ' + getX(p.dateStr) + ' ' + getY(p.val) + ' ';
                });
                trendSvg += '<path d="' + pathD + '" fill="none" stroke="' + color + '" stroke-width="2" stroke-linecap="round"/>';
              }
              sorted.forEach(function(p) {
                var isAbnormal = p.original.flag === 'High' || p.original.flag === 'Low';
                var dotColor = isAbnormal ? (p.original.flag === 'High' ? '#f97316' : '#fb923c') : color;
                trendSvg += '<circle cx="' + getX(p.dateStr) + '" cy="' + getY(p.val) + '" r="3" fill="' + dotColor + '"/>';
                var arrow = p.original.flag === 'High' ? '↑' : (p.original.flag === 'Low' ? '↓' : '');
                trendSvg += '<text x="' + getX(p.dateStr) + '" y="' + (getY(p.val) - 6) + '" text-anchor="middle" font-size="9" font-weight="bold" fill="' + dotColor + '">' + p.val + arrow + '</text>';
              });
            });
            trendSvg += '</svg>';
            trendSvg += '<div style="display:flex;gap:12px;justify-content:center;margin-top:8px;flex-wrap:wrap;">';
            trendDatasets.forEach(function(ds, i) {
              trendSvg += '<div style="display:flex;align-items:center;gap:4px;font-size:11px;"><div style="width:8px;height:8px;border-radius:50%;background:' + CHART_COLORS[i % CHART_COLORS.length] + '"></div><span style="color:#4b5563;">' + ds.name + '</span></div>';
            });
            trendSvg += '</div>';
          }
        }
        if (!trendSvg) {
          trendSvg = '<p style="color:#999;text-align:center;padding:20px;font-size:12px;">无趋势数据</p>';
        }

        // 生成用药甘特图SVG
        var ganttSvg = '';
        if (filteredMedsForPrint.length > 0) {
          var W = CHART_W, ROW_H = 28, PAD_L = CHART_PL, PAD_R = CHART_PR, PAD_T = 10;
          var totalDuration = rangeEndTs - rangeStartTs;
          if (totalDuration > 0) {
            var getX = function(ts) {
              return PAD_L + ((ts - rangeStartTs) / totalDuration) * (W - PAD_L - PAD_R);
            };
            var totalH = filteredMedsForPrint.length * ROW_H + PAD_T + 25;
            
            ganttSvg = '<svg width="100%" viewBox="0 0 ' + W + ' ' + totalH + '" style="max-width:' + W + 'px;display:block;margin:0 auto;">';
            ganttSvg += '<line x1="' + PAD_L + '" y1="' + PAD_T + '" x2="' + PAD_L + '" y2="' + (totalH - 20) + '" stroke="#cbd5e1" stroke-width="1"/>';
            
            filteredMedsForPrint.forEach(function(m, i) {
              var mStartTs = new Date(m.startTime).getTime();
              var mEndTs = m.endTime ? new Date(m.endTime).getTime() : rangeEndTs;
              var drawStart = Math.max(rangeStartTs, mStartTs);
              var drawEnd = Math.min(rangeEndTs, mEndTs);
              if (drawEnd >= drawStart) {
                var isActive = !m.endTime || new Date(m.endTime) >= new Date();
                var barWidth = Math.max(4, getX(drawEnd) - getX(drawStart));
                ganttSvg += '<circle cx="' + (PAD_L - 5) + '" cy="' + (i * ROW_H + PAD_T + 14) + '" r="2.5" fill="' + (isActive ? '#10b981' : '#94a3b8') + '"/>';
                ganttSvg += '<text x="' + (PAD_L - 10) + '" y="' + (i * ROW_H + PAD_T + 17) + '" text-anchor="end" font-size="10" fill="#334155" font-weight="500">' + m.name + '</text>';
                ganttSvg += '<rect x="' + getX(drawStart) + '" y="' + (i * ROW_H + PAD_T + 6) + '" width="' + barWidth + '" height="14" rx="7" fill="#6366f1" opacity="0.85"/>';
              }
            });
            
            ganttSvg += '<text x="' + PAD_L + '" y="' + (totalH - 5) + '" text-anchor="start" font-size="8" fill="#94a3b8">' + trendRange.start + '</text>';
            ganttSvg += '<text x="' + (W - PAD_R) + '" y="' + (totalH - 5) + '" text-anchor="end" font-size="8" fill="#94a3b8">' + trendRange.end + '</text>';
            ganttSvg += '</svg>';
          }
        }
        if (!ganttSvg) {
          ganttSvg = '<p style="color:#999;text-align:center;padding:20px;font-size:12px;">该时间段内无用药记录</p>';
        }

        // 生成趋势数据表格

                tableData.push({

                });

          tableData.forEach(function(item) {
            var flag = item.flag === 'High' ? ' ↑' : (item.flag === 'Low' ? ' ↓' : '');
            var flagColor = item.flag === 'High' ? 'color:#dc2626;' : (item.flag === 'Low' ? 'color:#ea580c;' : '');
            trendTableRows += '<tr><td style="border:1px solid #e2e8f0;padding:6px;">' + item.date + '</td><td style="border:1px solid #e2e8f0;padding:6px;">' + item.name + '</td><td style="border:1px solid #e2e8f0;padding:6px;' + flagColor + 'font-weight:bold;">' + item.val + flag + '</td><td style="border:1px solid #e2e8f0;padding:6px;">' + item.unit + '</td><td style="border:1px solid #e2e8f0;padding:6px;">' + item.refRange + '</td></tr>';
          });
        }

        // 生成用药记录明细表格
        var medsTableRows = '';
        if (filteredMedsForPrint.length > 0) {
          var sortedMeds = filteredMedsForPrint.slice().sort(function(a, b) { 
            return a.startTime.localeCompare(b.startTime);

          sortedMeds.forEach(function(m) {

            medsTableRows += '<td style="border:1px solid #e2e8f0;padding:6px;">' + m.startTime + '</td>';
            medsTableRows += '<td style="border:1px solid #e2e8f0;padding:6px;">' + endTimeText + '</td>';
            medsTableRows += '<td style="border:1px solid #e2e8f0;padding:6px;">' + (m.method || '-') + '</td>';
            medsTableRows += '<td style="border:1px solid #e2e8f0;padding:6px;' + statusStyle + 'font-weight:500;">' + statusText + '</td>';
            medsTableRows += '</tr>';

        reportContent += '<h1 style="font-size:18px;color:#4f46e5;margin:0 0 6px 0;">📊 健康趋势分析报告</h1>';
        reportContent += '<p style="font-size:11px;color:#64748b;margin:0;">生成时间:' + new Date().toLocaleString('zh-CN') + '</p>';
        reportContent += '</div>';
        
        reportContent += '<div style="background:#f8fafc;padding:10px;border-radius:8px;margin-bottom:16px;font-size:11px;">';
        reportContent += '<div style="margin-bottom:4px;"><span style="color:#64748b;">分析时间段:</span><strong>' + trendRange.start + ' 至 ' + trendRange.end + '</strong></div>';
        reportContent += '<div><span style="color:#64748b;">选中指标:</span><strong>' + selectedTrendItems.join('、') + '</strong></div>';
        reportContent += '</div>';
        
        reportContent += '<div style="margin-bottom:20px;">';
        reportContent += '<div style="font-size:13px;font-weight:bold;color:#334155;margin-bottom:10px;padding-left:10px;border-left:3px solid #6366f1;">📈 指标变化趋势</div>';
        reportContent += '<div style="background:#f8fafc;padding:12px;border-radius:8px;border:1px solid #e2e8f0;">' + trendSvg + '</div>';
        reportContent += '</div>';
        
        reportContent += '<div style="margin-bottom:20px;">';
        reportContent += '<div style="font-size:13px;font-weight:bold;color:#334155;margin-bottom:10px;padding-left:10px;border-left:3px solid #6366f1;">💊 同期用药记录 (' + filteredMedsForPrint.length + '项)</div>';
        reportContent += '<div style="background:#f8fafc;padding:12px;border-radius:8px;border:1px solid #e2e8f0;">' + ganttSvg + '</div>';
        reportContent += '</div>';
        
        reportContent += '<div style="margin-bottom:20px;">';
        reportContent += '<div style="font-size:13px;font-weight:bold;color:#334155;margin-bottom:10px;padding-left:10px;border-left:3px solid #6366f1;">📋 检测数据明细</div>';
        if (trendTableRows) {
          reportContent += '<table style="width:100%;border-collapse:collapse;font-size:10px;"><thead><tr style="background:#f8fafc;"><th style="border:1px solid #e2e8f0;padding:6px;text-align:left;">日期</th><th style="border:1px solid #e2e8f0;padding:6px;text-align:left;">指标</th><th style="border:1px solid #e2e8f0;padding:6px;text-align:left;">结果</th><th style="border:1px solid #e2e8f0;padding:6px;text-align:left;">单位</th><th style="border:1px solid #e2e8f0;padding:6px;text-align:left;">参考范围</th></tr></thead><tbody>' + trendTableRows + '</tbody></table>';
        } else {

        reportContent += '</div>';
        
        reportContent += '<div style="margin-bottom:20px;">';
        reportContent += '<div style="font-size:13px;font-weight:bold;color:#334155;margin-bottom:10px;padding-left:10px;border-left:3px solid #6366f1;">💊 用药记录明细</div>';

          reportContent += '<table style="width:100%;border-collapse:collapse;font-size:10px;"><thead><tr style="background:#f8fafc;"><th style="border:1px solid #e2e8f0;padding:6px;text-align:left;">药品名称</th><th style="border:1px solid #e2e8f0;padding:6px;text-align:left;">开始日期</th><th style="border:1px solid #e2e8f0;padding:6px;text-align:left;">结束日期</th><th style="border:1px solid #e2e8f0;padding:6px;text-align:left;">用法</th><th style="border:1px solid #e2e8f0;padding:6px;text-align:left;">状态</th></tr></thead><tbody>' + medsTableRows + '</tbody></table>';
        } else {
          reportContent += '<p style="color:#999;text-align:center;padding:16px;font-size:11px;">该时间段内无用药记录</p>';
        }
        reportContent += '</div>';
        
        reportContent += '<div style="margin-top:20px;text-align:center;color:#94a3b8;font-size:10px;padding-top:14px;border-top:1px solid #e2e8f0;">健康管家 Pro ' + VERSION + ' · 此报告仅供参考,如有疑问请咨询医生</div>';

        setPrintHtml(reportContent);
        setShowPrintPreview(true);
      };

      const handleScanFileUpload = async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        setUploadedFiles(files);
        setScanLoading(true);
        setDebugInfo('开始处理文件...');
        
        if (!getApiKeyFor(CURRENT_API)) {
          setScanLoading(false);
          setDebugInfo('错误: 未配置API Key');
          if (scanType === 'lab') {
            setScanEditData({ date: getLocalDateStr(new Date()), hospital: '', items: [{ name: '', result: '', unit: '', refRange: '', flag: 'Normal' }] });
          } else {
            setScanEditData({ date: getLocalDateStr(new Date()), hospital: '', modality: '', region: '', findings: '', impression: '' });
          }
          alert(`已上传 ${files.length} 个文件。\n\n⚠️ 未配置AI识别密钥\n请在菜单 ↑ 设置中选择API并配置密钥。\n\n当前请手动填写报告数据。`);
          e.target.value = '';
          return;
        }
        
        try {
          let aggregatedItems = [];
          let detectedDate = '';
          let detectedHospital = '';
          let detectedModality = '';
          let detectedRegion = '';
          let detectedFindings = '';
          let detectedImpression = '';
          let hasError = false;
          let errorDetail = '';
          
          for (let i = 0; i < files.length; i++) {
            const file = files[i];
            let mimeType = file.type;
            if (file.name.toLowerCase().endsWith('.pdf')) { mimeType = 'application/pdf'; } 
            else if (!mimeType || mimeType === '') {
              const ext = file.name.split('.').pop().toLowerCase();
              const mimeMap = { 'jpg': 'image/jpeg', 'jpeg': 'image/jpeg', 'png': 'image/png', 'webp': 'image/webp', 'pdf': 'application/pdf' };
              mimeType = mimeMap[ext] || 'image/jpeg';
            }
            setDebugInfo(`读取文件: ${file.name} (${mimeType})`);
            
            const base64 = await new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onloadend = () => {
                const result = reader.result;
                const base64Data = result.split(',')[1];
                resolve(base64Data);
              };
              reader.onerror = reject;
              reader.readAsDataURL(file);
            });
            
            setDebugInfo(prev => prev + `\n文件大小: ${Math.round(base64.length/1024)}KB`);
            const result = await analyzeMedicalImage(base64, mimeType, scanType, setDebugInfo);
            console.log('AI分析结果:', result);
            
            if (result && result.error) {
              hasError = true;
              errorDetail = result.detail ? JSON.stringify(result.detail).substring(0, 200) : result.error;
              continue;
            }
            
            if (result) {
              if (result.reportDate && !detectedDate) detectedDate = result.reportDate;
              if (result.hospital && !detectedHospital) detectedHospital = result.hospital;
              if (scanType === 'lab' && result.items) { aggregatedItems = [...aggregatedItems, ...result.items]; } 
              else if (scanType === 'imaging') {
                if (result.modality) detectedModality = result.modality;
                if (result.region) detectedRegion = result.region;
                if (result.findings) detectedFindings += (detectedFindings ? '\n\n' : '') + result.findings;
                if (result.impression) detectedImpression += (detectedImpression ? '\n\n' : '') + result.impression;
              }
            }
          }
          
          setScanLoading(false);
          
          if (scanType === 'lab') {
            // 去重处理 - 根据标准化后的名称
            const uniqueItems = [];
            const seenNames = new Set();
            
            aggregatedItems.forEach(item => {
              const cleanName = cleanIndicatorName(item.name || '').toLowerCase().replace(/\s+/g, '');
              if (!seenNames.has(cleanName) && cleanName) {
                seenNames.add(cleanName);
                uniqueItems.push(item);
              }
            });
            
            const processedItems = uniqueItems.length > 0 ? uniqueItems.map(item => ({
              name: cleanIndicatorName(item.name || ''),
              result: item.result || '',
              unit: item.unit || '',
              refRange: item.refRange || '',
              flag: calculateFlag(item.result, item.refRange)
            })) : [{ name: '', result: '', unit: '', refRange: '', flag: 'Normal' }];
            
            setScanEditData({
              date: detectedDate || getLocalDateStr(new Date()),
              hospital: detectedHospital || '',
              items: processedItems
            });
            if (hasError && uniqueItems.length === 0) alert(`⚠️ AI识别失败\n${errorDetail}\n\n请手动填写数据。`);
            else if (uniqueItems.length === 0) alert(`⚠️ 未能识别到指标数据,请手动填写。`);
            else if (aggregatedItems.length > uniqueItems.length) alert(`✓ 识别完成\n已去除 ${aggregatedItems.length - uniqueItems.length} 个重复指标`);
          } else {
            setScanEditData({
              date: detectedDate || getLocalDateStr(new Date()),
              hospital: detectedHospital || '',
              modality: detectedModality || '',
              region: detectedRegion || '',
              findings: detectedFindings || '',
              impression: detectedImpression || ''
            });
            if (!detectedFindings && !detectedImpression) {
              if (hasError) alert(`⚠️ AI识别失败\n${errorDetail}\n\n请手动填写数据。`);
              else alert(`⚠️ 未能识别到报告内容,请手动填写。`);
            }
          }
        } catch (error) {
          console.error('处理文件失败:', error);
          setDebugInfo(prev => prev + `\n处理失败: ${error.message}`);
          setScanLoading(false);
          if (scanType === 'lab') { setScanEditData({ date: getLocalDateStr(new Date()), hospital: '', items: [{ name: '', result: '', unit: '', refRange: '', flag: 'Normal' }] }); } 
          else { setScanEditData({ date: getLocalDateStr(new Date()), hospital: '', modality: '', region: '', findings: '', impression: '' }); }
          alert('文件处理失败: ' + error.message + '\n请手动填写数据。');
        }
        e.target.value = '';
      };
