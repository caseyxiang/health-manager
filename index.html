<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 版本号
    const VERSION = "v15.71";
    
    // LeanCloud 配置
    const LC_CONFIG = {
      appId: 'CRfeDG3VSyidc5qcX3SVtibn-gzGzoHsz',
      appKey: 'mqv2BXZT7u9GhAwVe7mAO9PL',
      serverURL: 'https://crfedg3v.lc-cn-n1-shared.com'
    };
    
    // SVG 图标组件
    const Icons = {
      Menu: (p) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||20} height={p.size||20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,

      AlertTriangle: (p) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||20} height={p.size||20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>,
      Info: (p) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||20} height={p.size||20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
      Check: (p) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||20} height={p.size||20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
      User: (p) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||20} height={p.size||20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
      LogIn: (p) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||20} height={p.size||20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg>,
      LogOut: (p) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||20} height={p.size||20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>,
      Download: (p) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||20} height={p.size||20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>,
      ChevronDown: (p) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||20} height={p.size||20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>,
    };

    // LeanCloud REST API 封装 - 增强版
    const LeanCloud = {
      // 基础请求 - 添加详细的错误处理
      async request(path, method = 'GET', body = null, sessionToken = null) {
        const headers = {
          'Content-Type': 'application/json',
          'X-LC-Id': LC_CONFIG.appId,
          'X-LC-Key': LC_CONFIG.appKey
        };
        if (sessionToken) headers['X-LC-Session'] = sessionToken;
        
        const options = { 
          method, 
          headers,
          mode: 'cors',
          credentials: 'omit' // Safari 兼容性
        };
        if (body) options.body = JSON.stringify(body);
        
        const url = `${LC_CONFIG.serverURL}/1.1${path}`;
        
        try {
          console.log(`[LeanCloud] 请求: ${method} ${url}`);
          const response = await fetch(url, options);
          
          // 记录响应状态
          console.log(`[LeanCloud] 响应状态: ${response.status}`);
          
          const data = await response.json();
          
          if (data.error) {
            const errorMsg = `LeanCloud错误 (${data.code}): ${data.error}`;
            console.error(errorMsg, data);
            throw new Error(errorMsg);
          }
          
          if (!response.ok) {
            throw new Error(`HTTP错误: ${response.status} ${response.statusText}`);
          }
          
          console.log(`[LeanCloud] 请求成功`);
          return data;
        } catch (err) {
          console.error('[LeanCloud] 请求失败:', err);
          
          // 更详细的错误信息
          if (err.message === 'Failed to fetch') {
            throw new Error('网络连接失败，请检查网络或稍后重试\n\n可能原因：\n- 网络未连接\n- 服务器无法访问\n- CORS跨域限制');
          }
          
          if (err.name === 'TypeError') {
            throw new Error('网络请求错误，请确认网络连接');
          }
          
          throw err;
        }
      },
      
      // 用户注册
      async signUp(username, password) {
        return this.request('/users', 'POST', { username, password });
      },
      
      // 用户登录
      async login(username, password) {
        return this.request('/login', 'POST', { username, password });
      },
      
      // 获取当前用户
      async getCurrentUser(sessionToken) {
        return this.request('/users/me', 'GET', null, sessionToken);
      },
      
      // 保存用户数据
      async saveUserData(userId, sessionToken, data) {
        const query = encodeURIComponent(JSON.stringify({ userId }));
        const existing = await this.request(`/classes/UserData?where=${query}`, 'GET', null, sessionToken);
        
        if (existing.results && existing.results.length > 0) {
          const objectId = existing.results[0].objectId;
          return this.request(`/classes/UserData/${objectId}`, 'PUT', { ...data, userId }, sessionToken);
        } else {
          return this.request('/classes/UserData', 'POST', { ...data, userId }, sessionToken);
        }
      },
      
      // 加载用户数据
      async loadUserData(userId, sessionToken) {
        const query = encodeURIComponent(JSON.stringify({ userId }));
        const result = await this.request(`/classes/UserData?where=${query}`, 'GET', null, sessionToken);
        return result.results && result.results.length > 0 ? result.results[0] : null;
      }
    };

    function App() {
      // 用户认证状态
      const [currentUser, setCurrentUser] = useState(() => {
        const saved = localStorage.getItem('health_pro_user');
        return saved ? JSON.parse(saved) : null;
      });
      const [sessionToken, setSessionToken] = useState(() => localStorage.getItem('health_pro_session') || null);
      const [showLoginModal, setShowLoginModal] = useState(false);
      const [isLoginMode, setIsLoginMode] = useState(true);
      const [loginForm, setLoginForm] = useState({ username: '', password: '', confirmPassword: '' });
      const [loginError, setLoginError] = useState('');
      const [loginLoading, setLoginLoading] = useState(false);
      
      // 同步状态 - 增强版
      const [syncStatus, setSyncStatus] = useState(''); // '', 'syncing', 'synced', 'error'
      const [lastSyncTime, setLastSyncTime] = useState(null);
      const [syncError, setSyncError] = useState(''); // 详细错误信息
      const [showSyncDebug, setShowSyncDebug] = useState(false); // 调试面板
      const [isOnline, setIsOnline] = useState(navigator.onLine);
      
      // 简化的演示状态
      const [demoData] = useState({
        message: "健康管家 Pro " + VERSION,
        features: ["云端同步", "多成员管理", "用药提醒", "检查报告"]
      });

      // 网络状态监听
      useEffect(() => {
        const handleOnline = () => {
          console.log('[Network] 网络已连接');
          setIsOnline(true);
          // 网络恢复后自动重试同步
          if (currentUser && sessionToken && syncStatus === 'error') {
            console.log('[Network] 网络恢复，尝试重新同步');
            loadFromCloud(currentUser.objectId, sessionToken);
          }
        };
        
        const handleOffline = () => {
          console.log('[Network] 网络已断开');
          setIsOnline(false);
          if (syncStatus === 'syncing') {
            setSyncStatus('error');
            setSyncError('网络连接中断');
          }
        };
        
        window.addEventListener('online', handleOnline);
        window.addEventListener('offline', handleOffline);
        
        return () => {
          window.removeEventListener('online', handleOnline);
          window.removeEventListener('offline', handleOffline);
        };
      }, [currentUser, sessionToken, syncStatus]);

      // 用户登录
      const handleLogin = async () => {
        if (!loginForm.username.trim() || !loginForm.password) {
          setLoginError('请输入用户名和密码');
          return;
        }
        
        setLoginLoading(true);
        setLoginError('');
        
        try {
          console.log('[Auth] 尝试登录:', loginForm.username);
          const user = await LeanCloud.login(loginForm.username.trim(), loginForm.password);
          console.log('[Auth] 登录成功:', user);
          
          setCurrentUser(user);
          setSessionToken(user.sessionToken);
          localStorage.setItem('health_pro_user', JSON.stringify(user));
          localStorage.setItem('health_pro_session', user.sessionToken);
          
          setShowLoginModal(false);
          setLoginForm({ username: '', password: '', confirmPassword: '' });
          
          // 登录后自动尝试从云端加载
          console.log('[Auth] 登录成功，开始加载云端数据');
          await loadFromCloud(user.objectId, user.sessionToken);
        } catch (e) {
          console.error('[Auth] 登录失败:', e);
          setLoginError(e.message || '登录失败');
        } finally {
          setLoginLoading(false);
        }
      };

      // 用户注册
      const handleSignUp = async () => {
        if (!loginForm.username.trim() || !loginForm.password) {
          setLoginError('请输入用户名和密码');
          return;
        }
        if (loginForm.password.length < 6) {
          setLoginError('密码至少6位');
          return;
        }
        if (loginForm.password !== loginForm.confirmPassword) {
          setLoginError('两次密码不一致');
          return;
        }
        
        setLoginLoading(true);
        setLoginError('');
        
        try {
          console.log('[Auth] 尝试注册:', loginForm.username);
          const user = await LeanCloud.signUp(loginForm.username.trim(), loginForm.password);
          console.log('[Auth] 注册成功:', user);
          
          setCurrentUser(user);
          setSessionToken(user.sessionToken);
          localStorage.setItem('health_pro_user', JSON.stringify(user));
          localStorage.setItem('health_pro_session', user.sessionToken);
          
          setShowLoginModal(false);
          setLoginForm({ username: '', password: '', confirmPassword: '' });
          
          // 注册后初始化云端数据
          console.log('[Auth] 注册成功，初始化云端数据');
          await saveToCloud(user.objectId, user.sessionToken);
        } catch (e) {
          console.error('[Auth] 注册失败:', e);
          setLoginError(e.message || '注册失败');
        } finally {
          setLoginLoading(false);
        }
      };

      // 退出登录
      const handleLogout = () => {
        console.log('[Auth] 用户退出登录');
        setCurrentUser(null);
        setSessionToken(null);
        localStorage.removeItem('health_pro_user');
        localStorage.removeItem('health_pro_session');
        setSyncStatus('');
        setSyncError('');
        setLastSyncTime(null);
        setLoginForm({ username: '', password: '', confirmPassword: '' });
        setLoginError('');
      };

      // 从云端加载数据
      const loadFromCloud = async (userId, token, showDebug = false) => {
        if (!userId || !token || userId === 'dev') {
          console.log('[Sync] 开发模式，跳过云同步');
          return;
        }
        
        if (!isOnline) {
          console.log('[Sync] 离线状态，无法同步');
          setSyncStatus('error');
          setSyncError('当前离线，无法同步云端数据');
          return;
        }
        
        console.log('[Sync] 开始从云端加载数据...');
        setSyncStatus('syncing');
        setSyncError('');
        
        try {
          const cloudData = await LeanCloud.loadUserData(userId, token);
          
          if (cloudData) {
            console.log('[Sync] 云端数据加载成功', cloudData);
            
            // 这里简化处理，实际应用需要合并数据
            localStorage.setItem('health_pro_cloud_data', JSON.stringify(cloudData));
            
            setSyncStatus('synced');
            setLastSyncTime(new Date());
            setSyncError('');
            console.log('[Sync] 数据同步完成');
          } else {
            console.log('[Sync] 云端暂无数据');
            setSyncStatus('synced');
            setLastSyncTime(new Date());
          }
        } catch (e) {
          console.error('[Sync] 从云端加载失败:', e);
          setSyncStatus('error');
          setSyncError(e.message || '同步失败');
          
          if (showDebug) {
            alert(`同步失败:\n\n${e.message}\n\n请检查网络连接或稍后重试`);
          }
        }
      };

      // 保存数据到云端
      const saveToCloud = async (userId = currentUser?.objectId, token = sessionToken) => {
        if (!userId || !token || userId === 'dev') {
          console.log('[Sync] 开发模式，跳过云同步');
          return;
        }
        
        if (!isOnline) {
          console.log('[Sync] 离线状态，无法同步');
          setSyncStatus('error');
          setSyncError('当前离线，数据将在网络恢复后同步');
          return;
        }
        
        console.log('[Sync] 开始保存数据到云端...');
        setSyncStatus('syncing');
        setSyncError('');
        
        try {
          const dataToSave = {
            demoData: demoData,
            lastUpdated: new Date().toISOString()
          };
          
          await LeanCloud.saveUserData(userId, token, dataToSave);
          
          console.log('[Sync] 数据保存成功');
          setSyncStatus('synced');
          setLastSyncTime(new Date());
          setSyncError('');
        } catch (e) {
          console.error('[Sync] 保存到云端失败:', e);
          setSyncStatus('error');
          setSyncError(e.message || '同步失败');
        }
      };

      // 手动同步按钮
      const handleManualSync = async () => {
        if (!currentUser || !sessionToken) {
          alert('请先登录');
          return;
        }
        
        console.log('[Sync] 用户触发手动同步');
        await loadFromCloud(currentUser.objectId, sessionToken, true);
      };

      // 登录后自动加载
      useEffect(() => {
        if (currentUser && sessionToken && !lastSyncTime) {
          console.log('[App] 检测到已登录用户，自动加载云端数据');
          loadFromCloud(currentUser.objectId, sessionToken);
        }
      }, [currentUser, sessionToken]);

      // 渲染同步状态图标
      const renderSyncIcon = () => {
        if (!isOnline) {
          return <Icons.CloudOff size={14} className="text-yellow-300" title="离线"/>;
        }
        
        if (syncStatus === 'syncing') {
          return <Icons.RefreshCw size={14} className="text-white animate-spin" title="同步中"/>;
        }
        
        if (syncStatus === 'error') {
          return <Icons.CloudOff size={14} className="text-red-300" title={syncError || '同步失败'}/>;
        }
        
        if (syncStatus === 'synced') {
          return <Icons.Cloud size={14} className="text-green-300" title="已同步"/>;
        }
        
        return <Icons.Cloud size={14} className="text-white/60" title="未同步"/>;
      };

      // 如果未登录，显示登录界面
      if (!currentUser) {
        return (
          <div className="w-full max-w-md mx-auto font-sans relative shadow-2xl h-full overflow-y-auto" style={{background: 'linear-gradient(to bottom right, #4f46e5, #4338ca, #7c3aed)'}}>
            <div className="absolute inset-0 overflow-hidden pointer-events-none">
              <div className="absolute -top-1/2 -left-1/2 w-full h-full rounded-full blur-3xl" style={{backgroundColor: 'rgba(255,255,255,0.05)'}}></div>
            </div>
            
            <div className="relative z-10 flex flex-col min-h-full justify-center p-6 py-12">
              <div className="text-center mb-8">
                <div className="w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl" style={{backgroundColor: 'rgba(255,255,255,0.2)'}}>
                  <Icons.Activity size={40} className="text-white"/>
                </div>
                <h1 className="text-3xl font-bold text-white mb-2">健康管家</h1>
                <p className="text-sm" style={{color: 'rgba(255,255,255,0.7)'}}>您的私人健康数据管理助手</p>
                <p className="text-xs mt-2" style={{color: 'rgba(255,255,255,0.5)'}}>{VERSION} - Safari优化版</p>
              </div>
              
              <div className="bg-white rounded-2xl shadow-2xl p-6 mb-6">
                <div className="flex mb-6">
                  <button 
                    onClick={() => { setIsLoginMode(true); setLoginError(''); }}
                    className={`flex-1 py-2 text-center font-bold rounded-l-xl transition-all ${isLoginMode ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-500'}`}
                  >
                    登录
                  </button>
                  <button 
                    onClick={() => { setIsLoginMode(false); setLoginError(''); }}
                    className={`flex-1 py-2 text-center font-bold rounded-r-xl transition-all ${!isLoginMode ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-500'}`}
                  >
                    注册
                  </button>
                </div>
                
                <div className="space-y-4">
                  <div>
                    <label className="text-sm font-medium text-gray-600 mb-1 block">用户名</label>
                    <input 
                      type="text" 
                      value={loginForm.username} 
                      onChange={e => setLoginForm({...loginForm, username: e.target.value})} 
                      placeholder="请输入用户名"
                      className="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500"
                    />
                  </div>
                  
                  <div>
                    <label className="text-sm font-medium text-gray-600 mb-1 block">密码</label>
                    <input 
                      type="password" 
                      value={loginForm.password} 
                      onChange={e => setLoginForm({...loginForm, password: e.target.value})} 
                      placeholder={isLoginMode ? "请输入密码" : "至少6位"}
                      className="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500"
                    />
                  </div>
                  
                  {!isLoginMode && (
                    <div>
                      <label className="text-sm font-medium text-gray-600 mb-1 block">确认密码</label>
                      <input 
                        type="password" 
                        value={loginForm.confirmPassword} 
                        onChange={e => setLoginForm({...loginForm, confirmPassword: e.target.value})} 
                        placeholder="请再次输入密码"
                        className="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500"
                      />
                    </div>
                  )}
                  
                  {loginError && (
                    <div className="text-red-500 text-sm bg-red-50 p-3 rounded-xl flex items-center gap-2">
                      <Icons.AlertTriangle size={16}/> {loginError}
                    </div>
                  )}
                  
                  <button 
                    onClick={isLoginMode ? handleLogin : handleSignUp}
                    disabled={loginLoading}
                    className="w-full py-3.5 bg-indigo-600 text-white rounded-xl font-bold disabled:opacity-50 flex items-center justify-center gap-2 shadow-lg hover:bg-indigo-700 transition-all"
                  >
                    {loginLoading ? (
                      <><Icons.RefreshCw size={18} className="animate-spin"/> 处理中...</>
                    ) : (
                      <><Icons.LogIn size={18}/> {isLoginMode ? '登录' : '注册'}</>
                    )}
                  </button>
                </div>
              </div>
              
              <div className="flex justify-center gap-6 text-xs" style={{color: 'rgba(255,255,255,0.8)'}}>
                <div className="flex items-center gap-1">
                  <Icons.Cloud size={14}/> 云端同步
                </div>
                <div className="flex items-center gap-1">
                  <Icons.Check size={14}/> Safari优化
                </div>
              </div>
              
              <button 
                onClick={() => {
                  setCurrentUser({ username: '开发模式', objectId: 'dev' });
                  setSessionToken(null);
                }}
                className="mt-4 text-xs text-white/40 hover:text-white/60 transition-colors"
              >
                开发模式 →
              </button>
            </div>
          </div>
        );
      }

      // 已登录，显示主界面
      return (
        <div className="w-full max-w-md mx-auto bg-slate-50 h-full flex flex-col font-sans text-slate-800 overflow-hidden relative shadow-2xl">
          {/* Header */}
          <header className="bg-indigo-700 text-white p-4 pt-6 pb-4 shadow-lg shrink-0 z-10">
            <div className="flex justify-between items-center">
              <div className="flex items-center gap-2">
                <Icons.Activity size={18}/>
                <h1 className="text-base font-bold">健康管家 {VERSION}</h1>
                {currentUser?.objectId === 'dev' && (
                  <span className="text-[10px] bg-yellow-500 text-yellow-900 px-1.5 py-0.5 rounded font-bold">开发</span>
                )}
              </div>
              
              <div className="flex items-center gap-2">
                {/* 同步状态和手动同步按钮 */}
                {currentUser?.objectId !== 'dev' && (
                  <div className="flex items-center gap-1">
                    <button 
                      onClick={handleManualSync}
                      disabled={syncStatus === 'syncing' || !isOnline}
                      className={`p-2 rounded-full transition-all ${
                        syncStatus === 'syncing' ? 'bg-indigo-500/50 cursor-not-allowed' : 
                        !isOnline ? 'bg-yellow-500/50 cursor-not-allowed' :
                        'bg-indigo-600 hover:bg-indigo-500'
                      }`}
                      title={
                        !isOnline ? '离线中' :
                        syncStatus === 'syncing' ? '同步中...' :
                        syncStatus === 'error' ? '同步失败，点击重试' :
                        '点击手动同步'
                      }
                    >
                      {renderSyncIcon()}
                    </button>
                    
                    {/* 调试按钮 */}
                    <button 
                      onClick={() => setShowSyncDebug(!showSyncDebug)}
                      className="p-1 rounded-full bg-indigo-600/50 text-xs"
                      title="查看同步详情"
                    >
                      <Icons.Info size={12}/>
                    </button>
                  </div>
                )}
                
                <button onClick={handleLogout} className="p-2 bg-indigo-600 rounded-full">
                  <Icons.LogOut size={16}/>
                </button>
              </div>
            </div>
            
            {/* 同步状态栏 */}
            {currentUser?.objectId !== 'dev' && (
              <div className="mt-2 text-xs">
                {!isOnline && (
                  <div className="bg-yellow-500/20 text-yellow-100 px-2 py-1 rounded flex items-center gap-1">
                    <Icons.CloudOff size={12}/>
                    <span>当前离线</span>
                  </div>
                )}
                {isOnline && syncStatus === 'syncing' && (
                  <div className="bg-white/20 text-white px-2 py-1 rounded flex items-center gap-1">
                    <Icons.RefreshCw size={12} className="animate-spin"/>
                    <span>同步中...</span>
                  </div>
                )}
                {isOnline && syncStatus === 'synced' && lastSyncTime && (
                  <div className="bg-green-500/20 text-green-100 px-2 py-1 rounded flex items-center gap-1">
                    <Icons.Check size={12}/>
                    <span>已同步 {lastSyncTime.toLocaleTimeString()}</span>
                  </div>
                )}
                {isOnline && syncStatus === 'error' && (
                  <div className="bg-red-500/20 text-red-100 px-2 py-1 rounded flex items-center gap-1">
                    <Icons.AlertTriangle size={12}/>
                    <span>{syncError || '同步失败'}</span>
                  </div>
                )}
              </div>
            )}
          </header>

          {/* Main Content */}
          <main className="flex-1 overflow-y-auto p-4 bg-slate-50">
            <div className="space-y-4">
              <div className="bg-white p-6 rounded-xl shadow-sm border">
                <h2 className="text-lg font-bold mb-2 flex items-center gap-2">
                  <Icons.User size={20}/>
                  欢迎回来
                </h2>
                <p className="text-gray-600 mb-4">用户: {currentUser.username}</p>
                
                <div className="bg-indigo-50 p-4 rounded-lg">
                  <h3 className="font-bold text-indigo-900 mb-2">演示数据</h3>
                  <p className="text-sm text-indigo-700 mb-2">{demoData.message}</p>
                  <div className="flex flex-wrap gap-2">
                    {demoData.features.map((feature, i) => (
                      <span key={i} className="bg-indigo-200 text-indigo-800 px-2 py-1 rounded text-xs">
                        {feature}
                      </span>
                    ))}
                  </div>
                </div>
              </div>
              
              {/* 网络状态卡片 */}
              <div className={`p-4 rounded-xl shadow-sm border ${isOnline ? 'bg-green-50 border-green-200' : 'bg-yellow-50 border-yellow-200'}`}>
                <div className="flex items-center gap-2 mb-2">
                  {isOnline ? (
                    <><Icons.Cloud size={20} className="text-green-600"/> <span className="font-bold text-green-900">网络正常</span></>
                  ) : (
                    <><Icons.CloudOff size={20} className="text-yellow-600"/> <span className="font-bold text-yellow-900">网络离线</span></>
                  )}
                </div>
                <p className="text-sm text-gray-600">
                  {isOnline ? '可以正常同步云端数据' : '数据将在网络恢复后自动同步'}
                </p>
              </div>
              
              {/* 测试按钮 */}
              <div className="space-y-2">
                <button 
                  onClick={handleManualSync}
                  disabled={!isOnline || syncStatus === 'syncing'}
                  className="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold disabled:opacity-50 flex items-center justify-center gap-2"
                >
                  <Icons.Download size={18}/>
                  {syncStatus === 'syncing' ? '同步中...' : '从云端加载数据'}
                </button>
                
                <button 
                  onClick={() => saveToCloud()}
                  disabled={!isOnline || syncStatus === 'syncing'}
                  className="w-full py-3 bg-green-600 text-white rounded-xl font-bold disabled:opacity-50 flex items-center justify-center gap-2"
                >
                  <Icons.Cloud size={18}/>
                  {syncStatus === 'syncing' ? '同步中...' : '保存数据到云端'}
                </button>
              </div>
            </div>
          </main>

          {/* 调试面板 */}
          {showSyncDebug && (
            <div className="absolute inset-0 bg-black/80 z-50 flex items-center justify-center p-4" onClick={() => setShowSyncDebug(false)}>
              <div className="bg-white rounded-xl p-4 max-w-sm w-full max-h-[80vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                <div className="flex justify-between items-center mb-4">
                  <h3 className="font-bold">同步调试信息</h3>
                  <button onClick={() => setShowSyncDebug(false)} className="p-1 bg-gray-100 rounded-full">
                    <Icons.X size={16}/>
                  </button>
                </div>
                
                <div className="space-y-3 text-sm">
                  <div className="bg-gray-50 p-3 rounded">
                    <div className="font-medium text-gray-700 mb-1">用户信息</div>
                    <div className="text-xs text-gray-600">
                      <div>用户名: {currentUser.username}</div>
                      <div>用户ID: {currentUser.objectId}</div>
                      <div>会话: {sessionToken ? '有效' : '无效'}</div>
                    </div>
                  </div>
                  
                  <div className="bg-gray-50 p-3 rounded">
                    <div className="font-medium text-gray-700 mb-1">同步状态</div>
                    <div className="text-xs text-gray-600">
                      <div>状态: {syncStatus || '未同步'}</div>
                      <div>网络: {isOnline ? '在线' : '离线'}</div>
                      <div>最后同步: {lastSyncTime ? lastSyncTime.toLocaleString() : '从未'}</div>
                      {syncError && <div className="text-red-600 mt-1">错误: {syncError}</div>}
                    </div>
                  </div>
                  
                  <div className="bg-gray-50 p-3 rounded">
                    <div className="font-medium text-gray-700 mb-1">环境信息</div>
                    <div className="text-xs text-gray-600">
                      <div>浏览器: {navigator.userAgent.includes('Safari') && !navigator.userAgent.includes('Chrome') ? 'Safari' : '其他'}</div>
                      <div>版本: {VERSION}</div>
                      <div>服务器: {LC_CONFIG.serverURL}</div>
                    </div>
                  </div>
                  
                  <button 
                    onClick={() => {
                      console.log('=== 调试信息 ===');
                      console.log('User:', currentUser);
                      console.log('Session:', sessionToken);
                      console.log('Sync Status:', syncStatus);
                      console.log('Network:', isOnline);
                      console.log('Error:', syncError);
                      alert('调试信息已输出到控制台\n\n请在Safari中打开:\n设置 -> Safari -> 高级 -> Web检查器');
                    }}
                    className="w-full py-2 bg-indigo-100 text-indigo-700 rounded-lg font-medium"
                  >
                    输出到控制台
                  </button>
                </div>
              </div>
            </div>
          )}
          
          {/* 离线提示条 */}
          {!isOnline && (
            <div className="absolute top-0 left-0 right-0 z-[60] bg-yellow-500 text-yellow-900 px-4 py-2 flex items-center justify-center gap-2 text-sm font-medium">
              <Icons.CloudOff size={16}/>
              网络已断开，数据将在恢复连接后同步
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
