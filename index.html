<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeanCloud API 测试</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
    }
    .test-section {
      margin: 20px 0;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }
    button {
      padding: 10px 20px;
      margin: 5px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    .result {
      margin-top: 10px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 5px;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 12px;
    }
    .success {
      background: #d4edda;
      color: #155724;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
    }
    input {
      padding: 8px;
      margin: 5px;
      border: 1px solid #ddd;
      border-radius: 3px;
      width: 200px;
    }
  </style>
</head>
<body>
  <h1>LeanCloud API 测试工具</h1>
  
  <div class="test-section">
    <h2>当前配置</h2>
    <div id="config"></div>
  </div>

  <div class="test-section">
    <h2>测试1: 使用AppKey注册用户</h2>
    <input type="text" id="username1" placeholder="用户名" value="test_appkey">
    <input type="password" id="password1" placeholder="密码" value="test123456">
    <button onclick="testSignUpWithAppKey()">测试注册（AppKey）</button>
    <div id="result1" class="result"></div>
  </div>

  <div class="test-section">
    <h2>测试2: 使用Master Key注册用户</h2>
    <input type="text" id="username2" placeholder="用户名" value="test_master">
    <input type="password" id="password2" placeholder="密码" value="test123456">
    <button onclick="testSignUpWithMasterKey()">测试注册（Master Key）</button>
    <div id="result2" class="result"></div>
  </div>

  <div class="test-section">
    <h2>测试3: 使用AppKey登录</h2>
    <input type="text" id="username3" placeholder="用户名" value="testuser">
    <input type="password" id="password3" placeholder="密码" value="test123456">
    <button onclick="testLoginWithAppKey()">测试登录（AppKey）</button>
    <div id="result3" class="result"></div>
  </div>

  <script>
    // 配置
    const CONFIG = {
      appId: 'eLCaXADeu03uzVV5jPhaoZdx-gzGzoHsz',
      appKey: 'SwfVKRpnv4ePuxQzw3aPG0pc',
      masterKey: 'f4lxiq5eH73ASa2O8NAfAwaq',
      serverURL: 'https://elcaxade.lc-cn-n1-shared.com'
    };

    // 显示配置
    document.getElementById('config').innerHTML = `
      <strong>AppID:</strong> ${CONFIG.appId}<br>
      <strong>AppKey:</strong> ${CONFIG.appKey}<br>
      <strong>Master Key:</strong> ${CONFIG.masterKey}<br>
      <strong>ServerURL:</strong> ${CONFIG.serverURL}<br>
      <strong>环境:</strong> 测试环境
    `;

    // 通用请求函数
    async function makeRequest(path, method, body, useMasterKey = false) {
      const key = useMasterKey ? `${CONFIG.masterKey},master` : CONFIG.appKey;
      const keyType = useMasterKey ? 'Master Key' : 'App Key';
      
      console.log(`\n=== ${keyType} 请求 ===`);
      console.log('URL:', `${CONFIG.serverURL}/1.1${path}`);
      console.log('Method:', method);
      console.log('X-LC-Key:', key);
      console.log('Body:', body);

      try {
        const response = await fetch(`${CONFIG.serverURL}/1.1${path}`, {
          method: method,
          headers: {
            'Content-Type': 'application/json',
            'X-LC-Id': CONFIG.appId,
            'X-LC-Key': key
          },
          body: body ? JSON.stringify(body) : null
        });

        console.log('Response Status:', response.status);
        const data = await response.json();
        console.log('Response Data:', data);

        return {
          ok: response.ok,
          status: response.status,
          data: data
        };
      } catch (error) {
        console.error('Request Error:', error);
        throw error;
      }
    }

    // 测试1: AppKey注册
    async function testSignUpWithAppKey() {
      const resultDiv = document.getElementById('result1');
      const username = document.getElementById('username1').value + '_' + Date.now();
      const password = document.getElementById('password1').value;

      resultDiv.className = 'result';
      resultDiv.textContent = '测试中...';

      try {
        const result = await makeRequest('/users', 'POST', { username, password }, false);
        
        if (result.ok) {
          resultDiv.className = 'result success';
          resultDiv.textContent = `✅ 成功！AppKey可以注册\n\n` +
            `状态码: ${result.status}\n` +
            `用户名: ${result.data.username}\n` +
            `ObjectId: ${result.data.objectId}\n` +
            `SessionToken: ${result.data.sessionToken}`;
        } else {
          resultDiv.className = 'result error';
          resultDiv.textContent = `❌ 失败！AppKey无法注册\n\n` +
            `状态码: ${result.status}\n` +
            `错误信息: ${result.data.error || result.data.code}\n` +
            `完整响应: ${JSON.stringify(result.data, null, 2)}`;
        }
      } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.textContent = `❌ 请求失败: ${error.message}`;
      }
    }

    // 测试2: Master Key注册
    async function testSignUpWithMasterKey() {
      const resultDiv = document.getElementById('result2');
      const username = document.getElementById('username2').value + '_' + Date.now();
      const password = document.getElementById('password2').value;

      resultDiv.className = 'result';
      resultDiv.textContent = '测试中...';

      try {
        const result = await makeRequest('/users', 'POST', { username, password }, true);
        
        if (result.ok) {
          resultDiv.className = 'result success';
          resultDiv.textContent = `✅ 成功！Master Key可以注册\n\n` +
            `状态码: ${result.status}\n` +
            `用户名: ${result.data.username}\n` +
            `ObjectId: ${result.data.objectId}\n` +
            `SessionToken: ${result.data.sessionToken}`;
        } else {
          resultDiv.className = 'result error';
          resultDiv.textContent = `❌ 失败！Master Key无法注册\n\n` +
            `状态码: ${result.status}\n` +
            `错误信息: ${result.data.error || result.data.code}\n` +
            `完整响应: ${JSON.stringify(result.data, null, 2)}`;
        }
      } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.textContent = `❌ 请求失败: ${error.message}`;
      }
    }

    // 测试3: AppKey登录
    async function testLoginWithAppKey() {
      const resultDiv = document.getElementById('result3');
      const username = document.getElementById('username3').value;
      const password = document.getElementById('password3').value;

      resultDiv.className = 'result';
      resultDiv.textContent = '测试中...';

      try {
        const result = await makeRequest('/login', 'POST', { username, password }, false);
        
        if (result.ok) {
          resultDiv.className = 'result success';
          resultDiv.textContent = `✅ 成功！AppKey可以登录\n\n` +
            `状态码: ${result.status}\n` +
            `用户名: ${result.data.username}\n` +
            `ObjectId: ${result.data.objectId}\n` +
            `SessionToken: ${result.data.sessionToken}`;
        } else {
          resultDiv.className = 'result error';
          resultDiv.textContent = `❌ 失败！AppKey无法登录\n\n` +
            `状态码: ${result.status}\n` +
            `错误信息: ${result.data.error || result.data.code}\n` +
            `完整响应: ${JSON.stringify(result.data, null, 2)}`;
        }
      } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.textContent = `❌ 请求失败: ${error.message}`;
      }
    }

    console.log('LeanCloud API 测试工具已加载');
    console.log('配置:', CONFIG);
  </script>
</body>
</html>
