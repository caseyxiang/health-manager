                          onChange={e => setDictEntryInput({...dictEntryInput, cnAliases: e.target.value})} 
                          className="w-full p-3 border rounded-xl" 
                          placeholder="用逗号分隔,如:白细胞,WBC计数"
                        />
                        <p className="text-xs text-gray-400 mt-1">多个别称用逗号、顿号或分号分隔</p>
                      </div>

                      {/* 英文名称 */}
                      <div>
                        <label className="text-xs font-bold text-gray-500 block mb-2">英文名称</label>
                        <input 
                          value={dictEntryInput.enName} 
                          onChange={e => setDictEntryInput({...dictEntryInput, enName: e.target.value})} 
                          className="w-full p-3 border rounded-xl" 
                          placeholder="如:WBC"
                        />
                      </div>

                      {/* 英文别称 */}
                      <div>
                        <label className="text-xs font-bold text-gray-500 block mb-2">英文别称(可选)</label>
                        <input 
                          value={dictEntryInput.enAliases} 
                          onChange={e => setDictEntryInput({...dictEntryInput, enAliases: e.target.value})} 
                          className="w-full p-3 border rounded-xl" 
                          placeholder="用逗号分隔,如:White Blood Cell,Leukocyte"
                        />
                      </div>

                      {/* 单位 */}
                      <div>
                        <label className="text-xs font-bold text-gray-500 block mb-2">单位</label>
                        <input 
                          value={dictEntryInput.unit} 
                          onChange={e => setDictEntryInput({...dictEntryInput, unit: e.target.value})} 
                          className="w-full p-3 border rounded-xl" 
                          placeholder="如:10^9/L"
                        />
                      </div>

                      {/* 参考范围 */}
                      <div>
                        <label className="text-xs font-bold text-gray-500 block mb-2">参考范围</label>
                        <input 
                          value={dictEntryInput.normalRange} 
                          onChange={e => setDictEntryInput({...dictEntryInput, normalRange: e.target.value})} 
                          className="w-full p-3 border rounded-xl" 
                          placeholder="如:4.0-10.0"
                        />
                      </div>

                      {/* 说明 */}
                      <div>
                        <label className="text-xs font-bold text-gray-500 block mb-2">临床意义说明</label>
                        <textarea 
                          value={dictEntryInput.description} 
                          onChange={e => setDictEntryInput({...dictEntryInput, description: e.target.value})} 
                          className="w-full p-3 border rounded-xl h-24" 
                          placeholder="简要说明该指标的临床意义..."
                        />
                      </div>
                    </div>

                    {/* 删除按钮 */}
                    {editingDictEntry && (
                      <button onClick={() => {
                        if (confirm(`确定要删除「${editingDictEntry.cnName}」吗?`)) {
                          setMedicalDictionary(medicalDictionary.filter(e => e.id !== editingDictEntry.id));
                          setEditingDictEntry(null);
                          setDictEntryInput({ cnName: '', cnAliases: '', enName: '', enAliases: '', description: '', unit: '', normalRange: '' });
                        }
                      }} className="w-full mt-4 py-3 bg-rose-50 text-rose-500 rounded-xl font-bold flex items-center justify-center gap-2">
                        <Icons.Trash2 size={16}/> 删除此指标
                      </button>
                    )}
                  </div>
                </div>
              )}
            </div>
          )}


          {/* Settings Modal */}
          {showSettingsModal && (
            <div className="absolute inset-0 z-[100] bg-black/50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-2xl p-5 w-full max-w-sm max-h-[90vh] overflow-y-auto">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="text-lg font-bold">设置</h3>
                  <button onClick={() => setShowSettingsModal(false)} className="p-1 bg-gray-100 rounded-full"><Icons.X size={16}/></button>
                </div>
                
                <div className="mb-6">
                  <h4 className="text-sm font-bold text-gray-700 mb-3 border-b pb-2">AI 识别设置</h4>
                  <div className="mb-3">
                    <label className="text-xs font-bold text-gray-500 block mb-2">选择AI服务</label>
                    <div className="space-y-2">
                      {API_PROVIDERS.map(provider => (
                        <button key={provider.id} onClick={() => { setApiProvider(provider.id); setApiKeyInput(getApiKeyFor(provider.id)); }} className={`w-full p-3 rounded-xl text-left text-sm font-medium transition-all flex items-center justify-between ${apiProvider === provider.id ? 'bg-indigo-100 text-indigo-700 ring-2 ring-indigo-500' : 'bg-gray-50 text-gray-600 hover:bg-gray-100'}`}>
                          <span>{provider.name}</span>
                          {getApiKeyFor(provider.id) && <span className="text-xs text-green-600">✓ 已配置</span>}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div className="mb-3">
                    <label className="text-xs font-bold text-gray-500 block mb-2">{API_PROVIDERS.find(p => p.id === apiProvider)?.name} API Key</label>
                    <div className="relative">
                      <input type={showApiKey ? "text" : "password"} value={apiKeyInput} onChange={e => setApiKeyInput(e.target.value)} className="w-full p-3 pr-12 border rounded-xl text-sm" placeholder={API_PROVIDERS.find(p => p.id === apiProvider)?.placeholder}/>
                      <button 
                        type="button"
                        onClick={() => setShowApiKey(!showApiKey)} 
                        className="absolute right-3 top-1/2 -translate-y-1/2 p-1.5 text-gray-400 hover:text-gray-600"
                      >
                        {showApiKey ? <Icons.EyeOff size={18}/> : <Icons.Eye size={18}/>}
                      </button>
                    </div>
                    <p className="text-xs text-gray-400 mt-1">每个AI服务使用独立的API Key</p>
                  </div>
                </div>

                {/* 测试环境配置 */}
                {CURRENT_ENV === 'test' && (
                  <div className="mb-6">
                    <h4 className="text-sm font-bold text-gray-700 mb-3 border-b pb-2 flex items-center gap-2">
                      🧪 测试环境配置
                    </h4>
                    <button 
                      onClick={() => {
                        // 读取当前配置
                        const currentConfig = loadTestConfig();
                        setTestConfigInput(currentConfig);
                        setShowTestConfigModal(true);
                      }} 
                      className="w-full py-3 bg-orange-50 text-orange-600 rounded-xl font-bold text-sm flex items-center justify-center gap-2 border border-orange-200 hover:bg-orange-100"
                    >
                      <Icons.Settings size={16}/> 配置测试环境LeanCloud
                    </button>
                    <p className="text-xs text-gray-500 mt-2 text-center">
                      {needsTestConfig ? '⚠️ 尚未配置' : '✅ 已配置'}
                    </p>
                  </div>
                )}

                <div className="mb-6">
                  <h4 className="text-sm font-bold text-gray-700 mb-3 border-b pb-2">数据管理</h4>
                  <button onClick={() => setShowResetConfirm(true)} className="w-full py-3 bg-rose-50 text-rose-600 rounded-xl font-bold text-sm flex items-center justify-center gap-2 border border-rose-100 hover:bg-rose-100">
                    <Icons.RefreshCw size={16}/> 重置所有数据
                  </button>
                </div>
                
                <div className="flex gap-3">
                  <button onClick={() => setShowSettingsModal(false)} className="flex-1 py-3 rounded-xl bg-gray-100 font-bold text-sm">取消</button>
                  <button onClick={() => {
                    CURRENT_API = apiProvider;
                    localStorage.setItem('ai_api_provider', apiProvider);
                    saveApiKeyFor(apiProvider, apiKeyInput);
                    setShowSettingsModal(false);
                    alert('设置已保存!');
                  }} className="flex-1 py-3 rounded-xl bg-indigo-600 text-white font-bold text-sm">保存</button>
                </div>
              </div>
            </div>
          )}

          {/* 成员管理表单模态框 */}
          {showMemberForm && (
            <div className="absolute inset-0 z-[70] bg-black/50 flex items-end justify-center" onClick={() => { setShowMemberForm(false); setEditingMember(null); }}>
              <div className="w-full max-w-lg bg-white rounded-t-2xl p-5 animate-slide-up" onClick={e => e.stopPropagation()}>
                <div className="flex justify-between items-center mb-4">
                  <h3 className="text-lg font-bold">{editingMember ? '编辑成员' : '添加成员'}</h3>
                  <button onClick={() => { setShowMemberForm(false); setEditingMember(null); }} className="p-1 bg-gray-100 rounded-full"><Icons.X size={16}/></button>
                </div>
                
                <div className="space-y-4">
                  <div>
                    <label className="text-xs font-bold text-gray-500 block mb-2">姓名/称呼 *</label>
                    <input 
                      type="text" 
                      value={memberInput.name} 
                      onChange={e => setMemberInput({...memberInput, name: e.target.value})} 
                      className="w-full p-3 border rounded-xl text-sm" 
                      placeholder="如:妈妈、爸爸、宝宝"
                    />
                  </div>
                  
                  <div>
                    <label className="text-xs font-bold text-gray-500 block mb-2">关系</label>
                    <input 
                      type="text" 
                      value={memberInput.relation} 
                      onChange={e => setMemberInput({...memberInput, relation: e.target.value})} 
                      className="w-full p-3 border rounded-xl text-sm" 
                      placeholder="如:本人、母亲、父亲、子女"
                    />
                  </div>
                  
                  <div>
                    <label className="text-xs font-bold text-gray-500 block mb-2">头像颜色</label>
                    <div className="flex gap-2 flex-wrap">
                      {MEMBER_COLORS.map(color => (
                        <button 
                          key={color.id}
                          type="button"
                          onClick={() => setMemberInput({...memberInput, color: color.id})}
                          className={`w-10 h-10 rounded-full flex items-center justify-center transition-all ${memberInput.color === color.id ? 'ring-2 ring-offset-2 ring-indigo-500 scale-110' : ''}`}
                          style={{ backgroundColor: color.hex }}
                        >
                          {memberInput.color === color.id && <Icons.Check size={16} className="text-white"/>}
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
                
                <div className="flex gap-3 mt-6">
                  <button 
                    onClick={() => { setShowMemberForm(false); setEditingMember(null); }} 
                    className="flex-1 py-3 rounded-xl bg-gray-100 font-bold text-sm"
                  >
                    取消
                  </button>
                  {editingMember && editingMember.id !== 'default' && members.length > 1 && (
                    <button 
                      onClick={() => { 
                        if (confirm(`确定要删除成员「${editingMember.name}」吗?该成员的所有数据将被清除。`)) {
                          deleteMember(editingMember.id); 
                          setShowMemberForm(false); 
                          setEditingMember(null); 
                        }
                      }} 
                      className="px-4 py-3 rounded-xl bg-rose-100 text-rose-600 font-bold text-sm"
                    >
                      <Icons.Trash2 size={16}/>
                    </button>
                  )}
                  <button 
                    onClick={() => editingMember ? updateMember() : addMember()} 
                    className="flex-1 py-3 rounded-xl bg-indigo-600 text-white font-bold text-sm disabled:opacity-50"
                    disabled={!memberInput.name.trim()}
                  >
                    {editingMember ? '保存' : '添加'}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Sync Conflict Modal - 同步冲突对话框 */}

          {/* Offline Indicator - 离线提示条 */}
          {!isOnline && (
            <div className="absolute top-0 left-0 right-0 z-[140] bg-yellow-500 text-yellow-900 px-4 py-2 flex items-center justify-center gap-2 text-sm font-medium shadow-lg">
              <Icons.CloudOff size={16}/>
              网络已断开,数据将在恢复连接后同步
            </div>
          )}
          
          {/* 退出登录Loading遮罩 */}
          {isLoggingOut && (
            <div className="absolute inset-0 z-[150] bg-black/60 flex items-center justify-center">
              <div className="bg-white rounded-2xl shadow-2xl p-8 text-center">
                <div className="w-16 h-16 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mx-auto mb-4"></div>
                <h3 className="text-lg font-bold text-gray-800 mb-2">退出登录中...</h3>
                <p className="text-sm text-gray-500">正在同步数据到云端</p>
                <p className="text-xs text-gray-400 mt-2">请稍候，最多3秒</p>
              </div>
            </div>
          )}

          {/* 数据冲突解决对话框 */}
          {/* 智能同步通知（方案A：非阻断式通知）*/}
          {syncNotification && (
            <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[155] w-[90%] max-w-sm animate-slide-down">
              <div className={`rounded-2xl shadow-2xl p-4 ${syncNotification.type === 'warning' ? 'bg-gradient-to-r from-yellow-50 to-orange-50 border-2 border-yellow-300' : 'bg-gradient-to-r from-blue-50 to-indigo-50 border-2 border-blue-300'}`}>
                <div className="flex items-start gap-3">
                  <div className={`w-10 h-10 rounded-full flex items-center justify-center shrink-0 ${syncNotification.type === 'warning' ? 'bg-yellow-200' : 'bg-blue-200'}`}>
                    {syncNotification.type === 'warning' ? (
                      <Icons.AlertTriangle size={20} className="text-yellow-700"/>
                    ) : (
                      <Icons.Cloud size={20} className="text-blue-700"/>
                    )}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className={`font-bold text-sm mb-1 ${syncNotification.type === 'warning' ? 'text-yellow-900' : 'text-blue-900'}`}>
                      {syncNotification.message}
                    </div>
                    {syncNotification.details && (
                      <div className={`text-xs whitespace-pre-line ${syncNotification.type === 'warning' ? 'text-yellow-700' : 'text-blue-700'}`}>
                        {syncNotification.details}
                      </div>
                    )}
                    {syncNotification.type === 'warning' && lastConflictData && (
                      <button 
                        onClick={() => { undoAutoSync(); }}
                        className="mt-2 text-xs font-bold underline text-yellow-800 hover:text-yellow-900"
                      >
                        撤销并恢复本地数据 →
                      </button>
                    )}
                  </div>
                  <button 
                    onClick={() => setSyncNotification(null)}
                    className={`p-1 rounded-full shrink-0 ${syncNotification.type === 'warning' ? 'hover:bg-yellow-200' : 'hover:bg-blue-200'}`}
                  >
                    <Icons.X size={16} className={syncNotification.type === 'warning' ? 'text-yellow-700' : 'text-blue-700'}/>
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* 被其他设备踢出提示 */}
          {isKickedOut && currentUser && (
            <div className="absolute inset-0 z-[160] bg-black/80 flex items-center justify-center p-6">
              <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center">
                <div className="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                  <Icons.AlertTriangle size={40} className="text-red-500"/>
                </div>
                <h3 className="text-xl font-bold text-gray-800 mb-3">账号已在其他设备登录</h3>
                <p className="text-sm text-gray-600 mb-6">{kickedOutReason || '检测到您的账号在其他设备登录，当前登录已失效。'}</p>
                <button 
                  onClick={() => {
                    setIsKickedOut(false);
                    // 清理状态，返回登录界面
                    setCurrentUser(null);
                    setSessionToken(null);
                  }}
                  className="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-lg hover:bg-indigo-700"
                >
                  重新登录
                </button>
              </div>
            </div>
          )}

          {/* 测试环境配置模态框 */}
          {showTestConfigModal && (
            <div className="absolute inset-0 z-[170] bg-black/70 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-md">
                <div className="flex items-center justify-between mb-4">
                  <div className="flex items-center gap-2">
                    <div className="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center">
                      🧪
                    </div>
                    <h3 className="text-lg font-bold">测试环境配置</h3>
                  </div>
                  <button 
                    onClick={() => setShowTestConfigModal(false)} 
                    className="p-1 bg-gray-100 rounded-full hover:bg-gray-200"
                  >
                    <Icons.X size={16}/>
                  </button>
                </div>

                <div className="bg-orange-50 border border-orange-200 rounded-xl p-3 mb-4">
                  <p className="text-sm text-orange-800">
                    <strong>首次配置</strong>：配置后将保存到浏览器，以后所有新版本都会自动使用此配置。
                  </p>
                </div>

                <div className="space-y-4 mb-6">
                  <div>
                    <label className="text-xs font-bold text-gray-600 block mb-2">
                      测试 AppID *
                    </label>
                    <input 
                      type="text"
                      value={testConfigInput.appId}
                      onChange={e => setTestConfigInput({...testConfigInput, appId: e.target.value})}
                      className="w-full p-3 border rounded-xl text-sm font-mono"
                      placeholder="xxxxx-gzGzoHsz"
                    />
                  </div>

                  <div>
                    <label className="text-xs font-bold text-gray-600 block mb-2">
                      测试 AppKey *
                    </label>
                    <input 
                      type="text"
                      value={testConfigInput.appKey}
                      onChange={e => setTestConfigInput({...testConfigInput, appKey: e.target.value})}
                      className="w-full p-3 border rounded-xl text-sm font-mono"
                      placeholder="xxxxxxxxxxxxx"
                    />
                  </div>

                  <div>
                    <label className="text-xs font-bold text-gray-600 block mb-2">
                      测试 API 域名 *
                    </label>
                    <input 
                      type="text"
                      value={testConfigInput.serverURL}
                      onChange={e => setTestConfigInput({...testConfigInput, serverURL: e.target.value})}
                      className="w-full p-3 border rounded-xl text-sm font-mono"
                      placeholder="https://xxxxx.lc-cn-n1-shared.com"
                    />
                  </div>
                </div>

                <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 mb-4">
                  <p className="text-xs text-blue-800">
                    <strong>📖 如何获取：</strong><br/>
                    1. 登录 <a href="https://console.leancloud.cn" target="_blank" className="underline">console.leancloud.cn</a><br/>
                    2. 创建应用：「健康管家Pro-测试」<br/>
                    3. 设置 → 应用凭证 → 复制配置
                  </p>
                </div>

                <div className="flex gap-3">
                  <button 
                    onClick={skipTestConfig}
                    className="flex-1 py-3 bg-gray-100 text-gray-600 rounded-xl font-bold text-sm hover:bg-gray-200"
                  >
                    稍后配置
                  </button>
                  <button 
                    onClick={saveTestConfig}
                    className="flex-1 py-3 bg-orange-500 text-white rounded-xl font-bold text-sm hover:bg-orange-600 shadow-lg"
                  >
                    保存配置
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Print Preview Modal */}
          {showPrintPreview && (
            <div className="absolute inset-0 z-[90] bg-white flex flex-col">
              <div className="p-4 border-b flex justify-between items-center bg-indigo-600 text-white">
                <button onClick={() => setShowPrintPreview(false)} className="p-2 bg-indigo-500 rounded-full"><Icons.X size={20}/></button>
                <h3 className="font-bold">报告预览</h3>
                <div className="w-10"/>
              </div>
              <div className="flex-1 overflow-y-auto p-4 bg-white">
                <div dangerouslySetInnerHTML={{__html: printHtml}} style={{fontFamily: '-apple-system, BlinkMacSystemFont, sans-serif', color: '#1e293b'}}/>
              </div>
              <div className="p-4 border-t bg-gray-50 flex gap-3">
                <button onClick={() => setShowPrintPreview(false)} className="flex-1 py-3 bg-gray-200 text-gray-700 rounded-xl font-bold text-sm">关闭</button>
                <button onClick={() => {
                  var el = document.createElement('textarea');
                  el.value = '📊 健康趋势分析报告\n' + '时间段: ' + trendRange.start + ' 至 ' + trendRange.end + '\n指标: ' + selectedTrendItems.join('、');
                  document.body.appendChild(el);
                  el.select();
                  document.execCommand('copy');
                  document.body.removeChild(el);
                  alert('报告摘要已复制到剪贴板!\n\n提示:您可以截图保存完整报告');
                }} className="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold text-sm">复制摘要</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    
    // 动态更新页面标题（显示环境标识）
    if (CURRENT_ENV === 'test') {
      document.title = `健康管家 Pro ${VERSION} [测试环境]`;
    }
  </script>
  <script>
    // Safari 兼容性和错误监控
    window.addEventListener('error', function(e) {
      console.error('Global error:', e.error);
      // 在Safari中显示错误(开发时)
      if (window.location.hostname === 'localhost' || window.location.hostname.includes('vercel')) {
        document.body.innerHTML = '<div style="color:white;padding:20px;background:#dc2626;"><h3>加载错误</h3><p>' + e.message + '</p><p>请检查浏览器控制台</p></div>';
      }
    });
    
    // 检测Safari并添加标记
    if (/^((?!chrome|android).)*safari/i.test(navigator.userAgent)) {
      document.documentElement.classList.add('is-safari');
    }
  </script>
</body>
</html>
