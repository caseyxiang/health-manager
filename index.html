 "findings": "左髋术后,周围软组织肿。", "impression": "左髋术后。"}, {"id": "0VE5LpZk9dUrKdZuHddM", "date": "2025-10-23", "hospital": "N/A", "modality": "DR左髋侧位", "region": "左髋", "findings": "见同日双髋正位报告。", "impression": "见同日双髋正位报告。"}, {"id": "bdgCyqaj2u7K1hJ5CdKm", "date": "2025-10-23", "hospital": "北京大学第一医院", "modality": "X线", "region": "双髋", "findings": "左股骨颈骨质不连,断端嵌插,股骨颈缩短,周围软组织肿胀。双髋关节对位可,左髋关节间隙变窄。双侧髋臼缘、坐骨结节及股骨大转子骨质增生。双侧股骨头形态可,表面光整。右髋周围软组织未见异常。", "impression": "左股骨颈骨折。 双髋关节退变。"}, {"id": "yYy6fNX0vdhpB5uNPSRD", "date": "2025-10-23", "hospital": "N/A", "modality": "DR左髋侧位", "region": "左髋", "findings": "见同日双髋正位报告。", "impression": "见同日双髋正位报告。"}, {"id": "sIfKTGWhe5QfMW6XBR0l", "date": "2025-10-13", "hospital": "北京大学第一医院", "modality": "增强上腹部MRI + MRCP", "region": "上腹部", "findings": "MRCP薄层扫描图像示: 肝胆管未见扩张,其内未见异常信号,肝门区胆管扩张。残余胰管未见扩张,其内未见异常信号。 上腹部T1WI、T2WI、DWI等图像及动态增强薄层扫描图像示: Whipple术后,吻合口未见明确异常信号,增强扫描未见异常强化。 肝脏大小、形态、信号未见异常,动态增强扫描未见异常强化区。肝内Glission鞘水肿。肝门区少许渗出。 残余胰腺萎缩,其内未见异常信号。 脾脏大小、形态、信号未见异常,动态增强扫描未见异常强化区。 双肾大小、形态、信号未见异常,动态增强扫描未见异常强化区。扫描范围内双侧肾盂及输尿管未见扩张,其内未见异常信号。 双侧肾上腺大小、形态、信号未见异常,动态增强扫描未见异常强化区。 肝门、胰周、腹膜后见多发小淋巴结,大者短径约0.8cm。 扫描范围内骨质未见破坏。", "impression": "Whipple术后改变,对比2025-6-16上腹MR: 肝外胆管扩张,肝内Glission鞘水肿,肝门区少许渗出,术后改变可能大,大致同前,建议复查。 肝门、胰周、腹膜后多发小淋巴结,部分较前略增大,建议随诊观察。"}, {"id": "O2vratMm5Rtz3sTCljXd", "date": "2025-10-09", "hospital": "", "modality": "CT平扫", "region": "盆腔", "findings": "盆腔CT薄层扫描图像示:膀胱壁未见异常增厚,膀胱内未见异常密度区。扫描范围肠道未见异常扩张,未见明显异常密度灶。扫描范围内未见增大淋巴结。盆腔少量积液。约腰5椎体前滑,I°。", "impression": "盆腔少量积液,建议结合临床,定期复查。约腰5椎体前滑,I°。"}, {"id": "eqvHDQmjEO3J9URs93hR", "date": "2025-10-09", "hospital": "", "modality": "胸部CT平扫", "region": "胸部", "findings": "胸部CT薄层扫描示:双肺散在实性微小结节,界清,大者位于右肺下叶后基底段(2-364),长径约0.8cm。双肺小叶间隔及小叶内间隔增厚,伴磨玻璃密度灶,右肺下叶为著。右肺中叶、左肺上叶、双肺下叶可见索条灶。双肺散在少许含气囊腔。双肺支气管血管束走行、分布未见异常,段及段以上支气管通畅。双侧胸腔未见积液,胸膜未见增厚。纵隔及双肺门未见肿大淋巴结。心脏形态未见异常。心包未见增厚,未见心包积液。扫描范围内未见骨质破坏。左叶甲状腺可见低密度结节伴钙化。", "impression": "对比本院2025-2-12胸部CT:双肺散在实性微小结节,较前略增大,性质待定,转移待除外,建议密切随诊或进一步检查。原心包少量积液此次未见。余大致同前:双肺间质性病变。右肺中叶、左肺上叶、双肺下叶索条,考虑膨胀不全或陈旧病变。双肺肺气囊。甲状腺左叶结节,建议结合B超检查。"}, {"id": "Nt9HvYscyrVwiLTGCOWm", "date": "2025-06-17", "hospital": "N/A", "modality": "上腹部增强MRI及MRCP", "region": "上腹部", "findings": "MRCP薄层扫描图像示:肝内胆管未见扩张,其内未见异常信号。残余胰管未见扩张,其内未见异常信号。上腹部T1WI、T2WI、DWI等图像及动态增强薄层扫描图像示:Whipple术后,吻合口未见明确异常信号,增强扫描未见异常强化。肝脏大小、形态、信号未见异常,动态增强扫描未见异常强化区。肝内Glission鞘水肿。肝门区少许渗出。残余胰腺萎缩,信号未见异常,动态增强扫描未见异常强化区。脾脏大小、形态、信号未见异常,动态增强扫描未见异常强化区。双肾大小、形态、信号未见异常,动态增强扫描未见异常强化区。扫描范围内双侧肾盂及输尿管未见扩张,其内未见异常信号。双侧肾上腺大小、形态、信号未见异常,动态增强扫描未见异常强化区。扫描范围内未见肿大淋巴结。扫描范围内骨质未见破坏。", "impression": "Whipple术后。肝外胆管扩张,肝内Glission鞘水肿,肝门区少许渗出,术后改变可能大,建议复查。"}, {"id": "8TX2n2EO7JNeQ7s04xeJ", "date": "2025-03-11", "hospital": "北京大学第一医院", "modality": "全身PET/CT显像", "region": "全身(含头部)", "findings": "Whipple 术后:吻合口可见高密度缝线,局部未见异常放射性分布。术区脂肪密度稍增高,膈脚后、肠系膜、腹膜后腹主动脉旁可见多发小淋巴结,较大者短径约7mm,FDG 摄取未见明显增高。口咽部及鼻咽部形态及放射性分布未见明显异常。甲状腺双叶大小、形态正常,甲状腺左叶下部可见一稍低密度结节,大小约 17mm×10mm,FDG 摄取未见增高。颈部及锁骨上区未见肿大或异常浓聚淋巴结。双侧上颌窦内可见软组织密度灶,葡萄糖代谢未见增高。双肺多发实性及磨玻璃密度结节,直径约2-4mm,界清,FDG 摄取未见增高。右肺下叶后基底段胸膜下可见一不规则小片状实变灶,FDG 摄取未见增高。双肺胸膜下小叶间隔轻度增厚。双肺支气管血管束走行自然,段及段以上支气管通畅。气管居中;胸膜未见增厚;双侧胸腔未见积液征象。纵隔及双侧肺门未见肿大淋巴结或淋巴结异常浓聚。心影不大,心肌显影。双侧乳腺呈生理性摄取,腺体及周围软组织未见异常密度改变;余胸部软组织未见异常影像。双侧腋窝未见肿大或异常浓聚淋巴结。胃充盈好,胃壁显影如常。肝脏形态可,轮廓光整,肝叶比例正常,肝实质密度弥漫减低,CTmean 37Hu(同层面脾脏 CTmean 47Hu),肝内胆管可见少许气体密度。脾脏不大,实质密度及放射性分布未见异常。双肾大小、形态正常,实质未见异常密度改变,放射性分布如常;双侧肾盏、肾盂及输尿管未见扩张。双侧肾上腺未见异常。肠道呈 FDG 生理性摄取。腹腔未见积液征象。腹壁软组织未见明显异常影像。膀胱充盈欠佳,膀胱壁密度及放射性分布未见异常。子宫局部未见异常放射性浓聚。双侧附件区放射性分布未见异常。双侧腹股沟无异常淋巴结显示。盆腔少量积液。视野内骨骼放射性分布未见异常。脊柱椎体缘多发增生硬化,部分可见骨桥形成。上、下肢关节带大致正常。右后胸壁皮肤局部可见一 FDG 摄取轻度增高灶,SUVmax 1.7,密度未见明确异常;右肩关节周围软组织局部 FDG 摄取轻度增高,SUVmax 2.4,密度未见异常;余视野内皮肤及软组织内未见异常放射性摄取。主动脉、双侧髂总动脉、双侧髂内外动脉管壁多发钙化斑块。大脑形态基本对称,沟回可见增宽加深,皮层各叶密度及放射性分布未见异常。双侧基底节区、左侧额叶、桥脑可见多发点片状低密度灶,FDG 摄取未见增高;中线无移位;脑室无扩大。小脑结构对称,放射性分布未见明显异常。", "impression": "1、① Whipple 术后:局部未见明确复发征象;②术区轻度脂肪水肿,考虑术后改变,建议随诊;③膈脚后、肠系膜、腹膜后腹主动脉旁多发小淋巴结,葡萄糖代谢未见明显增高,建议定期复查;2、①甲状腺左叶下极稍低密度结节,葡萄糖代谢未见增高,请结合超声;②双侧上颌窦炎;3、①双肺散在实性及磨玻璃密度结节,葡萄糖代谢未见增高,建议随诊;②右肺下叶后基底段胸膜下实性灶,葡萄糖代谢未见增高,膨胀不全?炎性?建议复查;③双肺轻度间质病变;4、脂肪肝;肝内胆管少许积气,考虑术后改变;盆腔少量积液;5、①右后胸壁皮肤局部葡萄糖代谢轻度增高灶,密度未见明确异常,考虑炎性可能大;②右肩关节周围软组织局部葡萄     function calculateFlag(result, refRange) {
      if (!result || !refRange) return 'Normal';
      const valMatch = result.toString().match(/-?\d+(?:\.\d+)?/);
      if (!valMatch) return 'Normal';
      const val = parseFloat(valMatch[0]);
      let cleanRange = refRange.toString()
        .replace(/[\u2013\u2014\u2212~~]/g, '-')
        .replace(/-+/g, '-')
        .replace(/[^\d.\-><]/g, '');
      
      if (cleanRange.includes('-')) {
        const parts = cleanRange.split('-').map(s => parseFloat(s.trim()));
        if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
          if (val < parts[0]) return 'Low';
          if (val > parts[1]) return 'High';
          return 'Normal';
        }
      }
      if (cleanRange.startsWith('<')) {
        const max = parseFloat(cleanRange.substring(1));
        if (!isNaN(max) && val > max) return 'High';
        return 'Normal';
      }
      if (cleanRange.startsWith('>')) {
        const min = parseFloat(cleanRange.substring(1));
        if (!isNaN(min) && val < min) return 'Low';
        return 'Normal';
      }
      return 'Normal';
    }

    // 健康指标迷你图表组件
    const VitalMiniChart = ({ data, color }) => {
      if (!data || data.length < 2) return null;
      const values = data.map(d => parseFloat(d.value1)).filter(v => !isNaN(v));
      if (values.length < 2) return null;
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = max - min || 1;
      const W = 60, H = 24, P = 2;
      const points = values.slice(-7).map((v, i, arr) => {
        const x = P + (i / (arr.length - 1)) * (W - 2*P);
        const y = H - P - ((v - min) / range) * (H - 2*P);
        return `${x},${y}`;
      }).join(' ');
      return (
        <svg width={W} height={H} className="opacity-60">
          <polyline points={points} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      );
    };

    
    // 健康指标趋势图组件
    const VitalTrendChart = ({ data, type, showDays = 30 }) => {
      if (!data || data.length < 2) {
        return (
          <div className="h-40 flex items-center justify-center text-gray-400 text-xs bg-gray-50 rounded-xl border border-dashed">
            数据不足,无法显示趋势图
          </div>
        );
      }
      
      const sortedData = [...data].sort((a, b) => {
        const dateA = `${a.date} ${a.time}`;
        const dateB = `${b.date} ${b.time}`;
        return dateA.localeCompare(dateB);
      });
      
      const cutoffDate = new Date();
      cutoffDate.setDate(cutoffDate.getDate() - showDays);
      const filteredData = sortedData.filter(d => new Date(d.date) >= cutoffDate);
      
      if (filteredData.length < 2) {
        return (
          <div className="h-40 flex items-center justify-center text-gray-400 text-xs bg-gray-50 rounded-xl border border-dashed">
            近{showDays}天内数据不足
          </div>
        );
      }
      
      const values1 = filteredData.map(d => parseFloat(d.value1)).filter(v => !isNaN(v));
      const values2 = type.hasTwo ? filteredData.map(d => parseFloat(d.value2)).filter(v => !isNaN(v)) : [];
      const allValues = type.hasTwo ? [...values1, ...values2] : values1;
      
      const minVal = Math.min(...allValues);
      const maxVal = Math.max(...allValues);
      const valSpan = maxVal - minVal || 1;
      const yPad = valSpan * 0.15;
      const yMin = minVal - yPad;
      const yMax = maxVal + yPad;
      
      const W = 300, H = 160, PL = 40, PR = 15, PT = 20, PB = 30;
      const uniqueDates = [...new Set(filteredData.map(d => d.date))];
      
      const getX = (idx) => {
        if (filteredData.length === 1) return (W - PL - PR) / 2 + PL;
        return PL + (idx / (filteredData.length - 1)) * (W - PL - PR);
      };
      const getY = (v) => H - PB - ((v - yMin) / (yMax - yMin)) * (H - PT - PB);
      
      const pathD1 = filteredData.map((d, idx) => {
        const v = parseFloat(d.value1);
        if (isNaN(v)) return '';
        return `${idx === 0 ? 'M' : 'L'} ${getX(idx)} ${getY(v)}`;
      }).filter(Boolean).join(' ');
      
      const pathD2 = type.hasTwo ? filteredData.map((d, idx) => {
        const v = parseFloat(d.value2);
        if (isNaN(v)) return '';
        return `${idx === 0 ? 'M' : 'L'} ${getX(idx)} ${getY(v)}`;
      }).filter(Boolean).join(' ') : '';
      
      const visibleDateLabels = uniqueDates.length <= 5 ? uniqueDates : 
        [uniqueDates[0], uniqueDates[Math.floor(uniqueDates.length/2)], uniqueDates[uniqueDates.length - 1]];
      
      let refLines = [];
      if (type.normalRange && type.normalRange !== '-') {
        const rangeMatch = type.normalRange.match(/(\d+(?:\.\d+)?)\s*[-~]\s*(\d+(?:\.\d+)?)/);
        if (rangeMatch) {
          const refMin = parseFloat(rangeMatch[1]);
          const refMax = parseFloat(rangeMatch[2]);
          if (!isNaN(refMin) && refMin >= yMin && refMin <= yMax) refLines.push({ val: refMin });
          if (!isNaN(refMax) && refMax >= yMin && refMax <= yMax) refLines.push({ val: refMax });
        }
      }
      
      return (
        <div className="bg-white p-4 rounded-xl shadow-sm border">
          <div className="flex items-center justify-between mb-3">
            <h4 className="text-xs font-bold text-gray-500 flex items-center gap-1">
              <Icons.BarChart2 size={14} style={{ color: type.color }} /> 趋势图
            </h4>
            <span className="text-xs text-gray-400">近{showDays}天</span>
          </div>
          <svg width="100%" viewBox={`0 0 ${W} ${H}`}>
            {[0,1,2,3,4].map(i => {
              const y = PT + i * (H - PT - PB) / 4;
              const val = yMax - (i / 4) * (yMax - yMin);
              return (<g key={i}><line x1={PL} y1={y} x2={W-PR} y2={y} stroke="#f1f5f9" strokeWidth="1"/><text x={PL-4} y={y+3} textAnchor="end" fontSize="9" fill="#94a3b8">{val.toFixed(1)}</text></g>);
            })}
            {refLines.map((ref, idx) => (<line key={idx} x1={PL} y1={getY(ref.val)} x2={W-PR} y2={getY(ref.val)} stroke="#10b981" strokeWidth="1" strokeDasharray="4,2" opacity="0.6"/>))}
            {visibleDateLabels.map((d, i) => {
              const dataIdx = filteredData.findIndex(fd => fd.date === d);
              if (dataIdx === -1) return null;
              return (<text key={i} x={getX(dataIdx)} y={H-10} textAnchor="middle" fontSize="9" fill="#6b7280">{d.slice(5)}</text>);
            })}
            {pathD1 && (<><path d={pathD1} fill="none" stroke={type.color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>{filteredData.map((d, idx) => {const v = parseFloat(d.value1);if (isNaN(v)) return null;return (<g key={idx}><circle cx={getX(idx)} cy={getY(v)} r={4} fill="white" stroke={type.color} strokeWidth="2"/>{(idx === 0 || idx === filteredData.length - 1) && (<text x={getX(idx)} y={getY(v) - 8} textAnchor="middle" fontSize="10" fontWeight="bold" fill={type.color}>{v}</text>)}</g>);})}</>)}
            {type.hasTwo && pathD2 && (<><path d={pathD2} fill="none" stroke="#f97316" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="4,2"/>{filteredData.map((d, idx) => {const v = parseFloat(d.value2);if (isNaN(v)) return null;return (<g key={idx}><circle cx={getX(idx)} cy={getY(v)} r={3} fill="#f97316"/>{(idx === 0 || idx === filteredData.length - 1) && (<text x={getX(idx)} y={getY(v) + 14} textAnchor="middle" fontSize="9" fill="#f97316">{v}</text>)}</g>);})}</>)}
          </svg>
          {type.hasTwo && (<div className="flex gap-4 justify-center mt-2 text-xs"><div className="flex items-center gap-1"><div className="w-3 h-0.5 rounded" style={{ backgroundColor: type.color }}/><span className="text-gray-500">{type.label1}</span></div><div className="flex items-center gap-1"><div className="w-3 h-0.5 rounded bg-orange-500"/><span className="text-gray-500">{type.label2}</span></div></div>)}
        </div>
      );
    };

const MedicationGantt = ({ meds, dateRange, selectedMeds }) => {
      if (!meds || meds.length === 0) return null;
      const W = 300, ROW_H = 28, PAD_L = 35, PAD_R = 15, PAD_T = 10;
      const startTs = new Date(dateRange.start).getTime();
      const endTs = new Date(dateRange.end).getTime();
      const totalDuration = endTs - startTs;
      if (totalDuration <= 0) return null;
      const getX = (ts) => PAD_L + ((ts - startTs) / totalDuration) * (W - PAD_L - PAD_R);
      
      const medsToShow = selectedMeds && selectedMeds.length > 0 
        ? meds.filter(m => selectedMeds.includes(m.id))
        : meds;
      
      const visibleMeds = medsToShow.filter(m => {
        const mStart = new Date(m.startTime).getTime();
        const mEnd = m.endTime ? new Date(m.endTime).getTime() : endTs;
        return mStart <= endTs && mEnd >= startTs;
      });
      if (visibleMeds.length === 0) return <div className="h-20 flex items-center justify-center text-xs text-gray-400 border border-dashed rounded-xl mt-3">该时间段内无用药记录</div>;
      const totalH = visibleMeds.length * ROW_H + PAD_T + 30;
      return (
        <div className="bg-white p-4 rounded-xl shadow-sm border border-indigo-50 mt-4">
          <h4 className="text-xs font-bold text-gray-400 mb-3 flex items-center gap-1"><Icons.Clock size={14} className="text-indigo-500"/> 同期用药记录</h4>
          <svg width="100%" viewBox={`0 0 ${W} ${totalH}`} className="overflow-visible">
            <defs><filter id="medShadow"><feDropShadow dx="0" dy="1" stdDeviation="1" floodOpacity="0.15"/></filter></defs>
            <line x1={PAD_L} y1={PAD_T} x2={PAD_L} y2={totalH - 20} stroke="#cbd5e1" strokeWidth="1.5"/>
            {visibleMeds.map((m, i) => {
              const mStartTs = new Date(m.startTime).getTime();
              const mEndTs = m.endTime ? new Date(m.endTime).getTime() : endTs;
              const drawStart = Math.max(startTs, mStartTs);
              const drawEnd = Math.min(endTs, mEndTs);
              if (drawEnd < drawStart) return null;
              const isActive = !m.endTime || new Date(m.endTime) >= new Date();
              return (
                <g key={m.id}>
                  <circle cx={2} cy={i * ROW_H + PAD_T + 12 + 6} r="2.5" fill={isActive ? "#10b981" : "#94a3b8"}/>
                  <rect x={getX(drawStart)} y={i * ROW_H + PAD_T + 12} width={Math.max(3, getX(drawEnd) - getX(drawStart))} height={14} rx={7} fill="#6366f1" opacity="0.85" filter="url(#medShadow)"/>
                  <text x={8} y={i * ROW_H + PAD_T + 12 - 3} fontSize="9" fill="#334155" fontWeight="600">{m.name}</text>
                </g>
              );
            })}
            <text x={PAD_L} y={totalH - 5} textAnchor="start" fontSize="9" fill="#94a3b8" fontWeight="500">{dateRange.start}</text>
            <text x={W - PAD_R} y={totalH - 5} textAnchor="end" fontSize="9" fill="#94a3b8" fontWeight="500">{dateRange.end}</text>
          </svg>
        </div>
      );
    };

      const handlePrintTrend = () => {
        if (!trendRange.start || !trendRange.end || selectedTrendItems.length === 0) {
          alert('请先选择指标和时间范围');

        }
        
        // 筛选时间段内的用药

          return medStartTs <= rangeEndTs && medEndTs >= rangeStartTs;
        }).filter(function(med) {
          return selectedMeds.includes(med.id);
        });

        // 统一尺寸常量
        var CHART_W = 320, CHART_PL = 40, CHART_PR = 15;

        // 生成趋势图SVG
        var trendSvg = '';
        if (trendDatasets && trendDatasets.length > 0) {
          var allPoints = [];
          trendDatasets.forEach(function(ds, i) {
            ds.points.forEach(function(p) {
              if (p.dateStr >= trendRange.start && p.dateStr <= trendRange.end) {
                allPoints.push({ dateStr: p.dateStr, val: p.val, flag: p.original.flag, color: CHART_COLORS[i % CHART_COLORS.length], dsIndex: i });
              }
            });
          });
          
          if (allPoints.length > 0) {
            var uniqueDates = [];
            allPoints.forEach(function(p) {
              if (uniqueDates.indexOf(p.dateStr) === -1) uniqueDates.push(p.dateStr);
            });
            uniqueDates.sort();
            
            var visibleDateLabels = uniqueDates;
            if (uniqueDates.length > 6) {
              var step = Math.ceil(uniqueDates.length / 6);
              visibleDateLabels = [];
              for (var di = 0; di < uniqueDates.length; di += step) {
                visibleDateLabels.push(uniqueDates[di]);
              }
              if (visibleDateLabels[visibleDateLabels.length - 1] !== uniqueDates[uniqueDates.length - 1]) {
                visibleDateLabels.push(uniqueDates[uniqueDates.length - 1]);
              }
            }
            
            var vals = allPoints.map(function(p) { return p.val; });
            var minVal = Math.min.apply(null, vals);
            var maxVal = Math.max.apply(null, vals);
            var valSpan = maxVal - minVal || 1;
            var yPad = valSpan * 0.2;
            var yMin = minVal - yPad, yMax = maxVal + yPad;
            var W = CHART_W, H = 200, PL = CHART_PL, PR = CHART_PR, PT = 25, PB = 35;
            
            var getX = function(d) {
              var idx = uniqueDates.indexOf(d);
              if (uniqueDates.length === 1) return (W - PL - PR) / 2 + PL;
              return PL + (idx / (uniqueDates.length - 1)) * (W - PL - PR);
            };
            var getY = function(v) {
              return H - PB - ((v - yMin) / (yMax - yMin)) * (H - PT - PB);
            };
            
            trendSvg = '<svg width="100%" viewBox="0 0 ' + W + ' ' + H + '" style="max-width:' + W + 'px;display:block;margin:0 auto;">';
            for (var i = 0; i <= 4; i++) {
              var y = PT + i * (H - PT - PB) / 4;
              var val = yMax - (i / 4) * (yMax - yMin);
              trendSvg += '<line x1="' + PL + '" y1="' + y + '" x2="' + (W-PR) + '" y2="' + y + '" stroke="#e5e7eb" stroke-dasharray="2"/>';
              trendSvg += '<text x="' + (PL-4) + '" y="' + (y+3) + '" text-anchor="end" font-size="9" fill="#9ca3af">' + val.toFixed(1) + '</text>';
            }
            visibleDateLabels.forEach(function(d) {
              trendSvg += '<text x="' + getX(d) + '" y="' + (H-12) + '" text-anchor="middle" font-size="8" fill="#6b7280">' + d.slice(5) + '</text>';
            });
            trendDatasets.forEach(function(ds, i) {
              var color = CHART_COLORS[i % CHART_COLORS.length];
              var sorted = [];
              ds.points.forEach(function(p) {
                if (p.dateStr >= trendRange.start && p.dateStr <= trendRange.end) {
                  sorted.push(p);
                }
              });
              sorted.sort(function(a,b) { return a.dateStr.localeCompare(b.dateStr); });
              
              if (sorted.length > 1) {
                var pathD = '';
                sorted.forEach(function(p, idx) {
                  pathD += (idx === 0 ? 'M' : 'L') + ' ' + getX(p.dateStr) + ' ' + getY(p.val) + ' ';
                });
                trendSvg += '<path d="' + pathD + '" fill="none" stroke="' + color + '" stroke-width="2" stroke-linecap="round"/>';
              }
              sorted.forEach(function(p) {
                var isAbnormal = p.original.flag === 'High' || p.original.flag === 'Low';
                var dotColor = isAbnormal ? (p.original.flag === 'High' ? '#f97316' : '#fb923c') : color;
                trendSvg += '<circle cx="' + getX(p.dateStr) + '" cy="' + getY(p.val) + '" r="3" fill="' + dotColor + '"/>';
                var arrow = p.original.flag === 'High' ? '↑' : (p.original.flag === 'Low' ? '↓' : '');
                trendSvg += '<text x="' + getX(p.dateStr) + '" y="' + (getY(p.val) - 6) + '" text-anchor="middle" font-size="9" font-weight="bold" fill="' + dotColor + '">' + p.val + arrow + '</text>';
              });

            trendSvg += '</svg>';
            trendSvg += '<div style="display:flex;gap:12px;justify-content:center;margin-top:8px;flex-wrap:wrap;">';
            trendDatasets.forEach(function(ds, i) {

            });
            trendSvg += '</div>';

        }

        // 生成用药甘特图SVG

          var W = CHART_W, ROW_H = 28, PAD_L = CHART_PL, PAD_R = CHART_PR, PAD_T = 10;
          var totalDuration = rangeEndTs - rangeStartTs;

            var getX = function(ts) {
              return PAD_L + ((ts - rangeStartTs) / totalDuration) * (W - PAD_L - PAD_R);
            };

        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        setUploadedFiles(files);
        setScanLoading(true);
        setDebugInfo('开始处理文件...');
        
        if (!API_KEY) {
          setScanLoading(false);
          setDebugInfo('错误: 未配置API Key');
          if (scanType === 'lab') {
            setScanEditData({ date: getLocalDateStr(new Date()), hospital: '', items: [{ name: '', result: '', unit: '', refRange: '', flag: 'Normal' }] });
          } else {
            setScanEditData({ date: getLocalDateStr(new Date()), hospital: '', modality: '', region: '', findings: '', impression: '' });
          }
          alert(`已上传 ${files.length} 个文件。\n\n⚠️ 未配置AI识别密钥\n请在菜单 ↑ 设置中选择API并配置密钥。\n\n当前请手动填写报告数据。`);
          e.target.value = '';
          return;
        }
        
        try {
          let aggregatedItems = [];
          let detectedDate = '';
          let detectedHospital = '';
          let detectedModality = '';
          let detectedRegion = '';
          let detectedFindings = '';
          let detectedImpression = '';
          let hasError = false;
          let errorDetail = '';
          
          for (let i = 0; i < files.length; i++) {
            const file = files[i];
            let mimeType = file.type;
            if (file.name.toLowerCase().endsWith('.pdf')) { mimeType = 'application/pdf'; } 
            else if (!mimeType || mimeType === '') {
              const ext = file.name.split('.').pop().toLowerCase();
              const mimeMap = { 'jpg': 'image/jpeg', 'jpeg': 'image/jpeg', 'png': 'image/png', 'webp': 'image/webp', 'pdf': 'application/pdf' };
              mimeType = mimeMap[ext] || 'image/jpeg';
            }
            setDebugInfo(`读取文件: ${file.name} (${mimeType})`);
            
            const base64 = await new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onloadend = () => {
                const result = reader.result;
                const base64Data = result.split(',')[1];
                resolve(base64Data);
              };
              reader.onerror = reject;
              reader.readAsDataURL(file);
            });
            
            setDebugInfo(prev => prev + `\n文件大小: ${Math.round(base64.length/1024)}KB`);
            const result = await analyzeMedicalImage(base64, mimeType, scanType, setDebugInfo);
            console.log('AI分析结果:', result);
            
            if (result && result.error) {
              hasError = true;
              errorDetail = result.detail ? JSON.stringify(result.detail).substring(0, 200) : result.error;
              continue;
            }
            
            if (result) {
              if (result.reportDate && !detectedDate) detectedDate = result.reportDate;
              if (result.hospital && !detectedHospital) detectedHospital = result.hospital;
              if (scanType === 'lab' && result.items) { aggregatedItems = [...aggregatedItems, ...result.items]; } 
              else if (scanType === 'imaging') {
                if (result.modality) detectedModality = result.modality;
                if (result.region) detectedRegion = result.region;
                if (result.findings) detectedFindings += (detectedFindings ? '\n\n' : '') + result.findings;
                if (result.impression) detectedImpression += (detectedImpression ? '\n\n' : '') + result.impression;
              }
            }
          }
          
          setScanLoading(false);
          
          if (scanType === 'lab') {
            const processedItems = aggregatedItems.length > 0 ? aggregatedItems.map(item => ({
              name: cleanIndicatorName(item.name || ''),
              result: item.result || '',
              unit: item.unit || '',
              refRange: item.refRange || '',
              flag: calculateFlag(item.result, item.refRange)
            })) : [{ name: '', result: '', unit: '', refRange: '', flag: 'Normal' }];
            
            setScanEditData({
              date: detectedDate || getLocalDateStr(new Date()),
              hospital: detectedHospital || '',
              items: processedItems
            });
            if (hasError && aggregatedItems.length === 0) alert(`⚠️ AI识别失败\n${errorDetail}\n\n请手动填写数据。`);
            else if (aggregatedItems.length === 0) alert(`⚠️ 未能识别到指标数据,请手动填写。`);

              modality: detectedModality || '',
              region: detectedRegion || '',
              findings: detectedFindings || '',
              impression: detectedImpression || ''
            });
            if (!detectedFindings && !detectedImpression) {
              if (hasError) alert(`⚠️ AI识别失败\n${errorDetail}\n\n请手动填写数据。`);
              else alert(`⚠️ 未能识别到报告内容,请手动填写。`);

          setScanLoading(false);

          alert('文件处理失败: ' + error.message + '\n请手动填写数据。');
        }
        e.target.value = '';
      };

          {showDeleteConfirm && (
            <div className="absolute inset-0 z-[100] bg-black/50 flex items-center justify-center p-6">
              <div className="bg-white rounded-2xl shadow-xl p-6 w-full max-w-xs text-center">
                <Icons.AlertTriangle size={40} className="text-rose-500 mx-auto mb-3"/>
                <h3 className="text-lg font-bold mb-2">确认删除?</h3>
                <p className="text-sm text-gray-500 mb-5">此操作无法撤销</p>
                <div className="flex gap-3">
                  <button onClick={() => setShowDeleteConfirm(null)} className="flex-1 py-3 rounded-xl bg-gray-100 font-bold">取消</button>
                  <button onClick={confirmDelete} className="flex-1 py-3 rounded-xl bg-rose-500 text-white font-bold">删除</button>
                </div>
              </div>
            </div>
          )}

          {/* Restore Modal */}
          {showRestoreModal && (
            <div className="absolute inset-0 z-[100] bg-black/50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-2xl p-5 w-full max-w-sm">
                <div className="flex justify-between items-center mb-4"><h3 className="text-lg font-bold">恢复数据</h3><button onClick={() => setShowRestoreModal(false)} className="p-1 bg-gray-100 rounded-full"><Icons.X size={16}/></button></div>
                <p className="text-sm text-gray-500 mb-4">选择之前导出的JSON备份文件来恢复数据。<span className="text-rose-500 font-medium">注意:恢复将覆盖现有数据。</span></p>
                <input type="file" ref={restoreFileRef} onChange={handleFileRestore} accept=".json" className="hidden"/>
                <button onClick={() => restoreFileRef.current?.click()} className="w-full py-4 border-2 border-dashed border-indigo-300 rounded-xl bg-indigo-50 text-indigo-600 font-bold flex items-center justify-center gap-2 hover:bg-indigo-100"><Icons.Upload size={20}/> 选择备份文件</button>
              </div>
            </div>
          )}

          {/* Reset Confirm Modal */}
          {showResetConfirm && (
            <div className="absolute inset-0 z-[110] bg-black/50 flex items-center justify-center p-6">
              <div className="bg-white rounded-2xl shadow-xl p-6 w-full max-w-xs text-center">
                <Icons.AlertTriangle size={40} className="text-rose-500 mx-auto mb-3"/>
                <h3 className="text-lg font-bold mb-2">重置所有数据?</h3>
                <p className="text-sm text-gray-500 mb-5">这将删除所有自定义数据并恢复为初始演示数据。此操作无法撤销!</p>
                <div className="flex gap-3">
                  <button onClick={() => setShowResetConfirm(false)} className="flex-1 py-3 rounded-xl bg-gray-100 font-bold">取消</button>
                  <button onClick={handleResetData} className="flex-1 py-3 rounded-xl bg-rose-500 text-white font-bold">确认重置</button>
                </div>
              </div>
            </div>
          )}


          {/* Backup Modal - 备份数据 */}
          {showBackupModal && (
            <div className="absolute inset-0 z-[100] bg-black/50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-xs text-center">
                <div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                  <Icons.Check size={40} className="text-green-600"/>
                </div>
                <h3 className="text-lg font-bold text-slate-800 mb-2">备份就绪</h3>
                <p className="text-sm text-gray-500 mb-1">文件大小: {backupStats.size}KB</p>
                <p className="text-xs text-gray-400 mb-6">包含 {backupStats.members || 1} 个成员、{backupStats.meds} 个计划、{backupStats.catalog} 个药品</p>
                
                <button 
                  type="button"
                  onClick={downloadBackupFile} 
                  className="w-full mb-3 py-3 rounded-xl bg-indigo-50 text-indigo-600 font-bold text-sm flex items-center justify-center gap-2 active:bg-indigo-100 border border-indigo-200"
                >
                  <Icons.Download size={16}/> 下载文件
                </button>
                <button 
                  type="button"
                  onClick={copyBackupData} 
                  className="w-full mb-3 py-3 rounded-xl bg-gray-100 text-gray-600 font-bold text-sm flex items-center justify-center gap-2 active:bg-gray-200"
                >
                  <Icons.FileJson size={16}/> 复制数据
                </button>
                <button 
                  type="button"
                  onClick={() => setShowBackupModal(false)} 
                  className="w-full py-3 rounded-xl bg-indigo-600 text-white font-bold text-sm shadow-lg active:bg-indigo-700"
                >
                  关闭
                </button>
              </div>
            </div>
          )}

          {/* Settings Modal */}
          {showSettingsModal && (
            <div className="absolute inset-0 z-[100] bg-black/50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-2xl p-5 w-full max-w-sm max-h-[90vh] overflow-y-auto">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="text-lg font-bold">设置</h3>
                  <button onClick={() => setShowSettingsModal(false)} className="p-1 bg-gray-100 rounded-full"><Icons.X size={16}/></button>
                </div>
                
                <div className="mb-6">
                  <h4 className="text-sm font-bold text-gray-700 mb-3 border-b pb-2">AI 识别设置</h4>
                  <div className="mb-3">
                    <label className="text-xs font-bold text-gray-500 block mb-2">选择AI服务</label>
                    <div className="space-y-2">
                      {API_PROVIDERS.map(provider => (
                        <button key={provider.id} onClick={() => setApiProvider(provider.id)} className={`w-full p-3 rounded-xl text-left text-sm font-medium transition-all ${apiProvider === provider.id ? 'bg-indigo-100 text-indigo-700 ring-2 ring-indigo-500' : 'bg-gray-50 text-gray-600 hover:bg-gray-100'}`}>{provider.name}</button>
                      ))}
                    </div>
                  </div>
                  <div className="mb-3">
                    <label className="text-xs font-bold text-gray-500 block mb-2">API Key</label>
                    <div className="relative">
                      <input type={showApiKey ? "text" : "password"} value={apiKeyInput} onChange={e => setApiKeyInput(e.target.value)} className="w-full p-3 pr-12 border rounded-xl text-sm" placeholder={API_PROVIDERS.find(p => p.id === apiProvider)?.placeholder}/>
                      <button 
                        type="button"
                        onClick={() => setShowApiKey(!showApiKey)} 
                        className="absolute right-3 top-1/2 -translate-y-1/2 p-1.5 text-gray-400 hover:text-gray-600"
                      >
                        {showApiKey ? <Icons.EyeOff size={18}/> : <Icons.Eye size={18}/>}
                      </button>
                    </div>
                  </div>
                </div>

                <div className="mb-6">
                  <h4 className="text-sm font-bold text-gray-700 mb-3 border-b pb-2">数据管理</h4>
                  <button onClick={() => setShowResetConfirm(true)} className="w-full py-3 bg-rose-50 text-rose-600 rounded-xl font-bold text-sm flex items-center justify-center gap-2 border border-rose-100 hover:bg-rose-100">
                    <Icons.RefreshCw size={16}/> 重置所有数据
                  </button>
                </div>
                
                <div className="flex gap-3">
                  <button onClick={() => setShowSettingsModal(false)} className="flex-1 py-3 rounded-xl bg-gray-100 font-bold text-sm">取消</button>
                  <button onClick={() => {
                    CURRENT_API = apiProvider;
                    API_KEY = apiKeyInput;
                    localStorage.setItem('ai_api_provider', apiProvider);
                    localStorage.setItem('ai_api_key', apiKeyInput);
                    setShowSettingsModal(false);
                    alert('设置已保存!');
                  }} className="flex-1 py-3 rounded-xl bg-indigo-600 text-white font-bold text-sm">保存</button>
                </div>
              </div>
            </div>
          )}

          {/* 成员管理表单模态框 */}
          {showMemberForm && (
            <div className="absolute inset-0 z-[70] bg-black/50 flex items-end justify-center" onClick={() => { setShowMemberForm(false); setEditingMember(null); }}>
              <div className="w-full max-w-lg bg-white rounded-t-2xl p-5 animate-slide-up" onClick={e => e.stopPropagation()}>
                <div className="flex justify-between items-center mb-4">
                  <h3 className="text-lg font-bold">{editingMember ? '编辑成员' : '添加成员'}</h3>
                  <button onClick={() => { setShowMemberForm(false); setEditingMember(null); }} className="p-1 bg-gray-100 rounded-full"><Icons.X size={16}/></button>
                </div>
                
                <div className="space-y-4">
                  <div>
                    <label className="text-xs font-bold text-gray-500 block mb-2">姓名/称呼 *</label>
                    <input 
                      type="text" 
                      value={memberInput.name} 
                      onChange={e => setMemberInput({...memberInput, name: e.target.value})} 
                      className="w-full p-3 border rounded-xl text-sm" 
                      placeholder="如：妈妈、爸爸、宝宝"
                    />
                  </div>
                  
                  <div>
                    <label className="text-xs font-bold text-gray-500 block mb-2">关系</label>
                    <input 
                      type="text" 
                      value={memberInput.relation} 
                      onChange={e => setMemberInput({...memberInput, relation: e.target.value})} 
                      className="w-full p-3 border rounded-xl text-sm" 
                      placeholder="如：本人、母亲、父亲、子女"
                    />
                  </div>
                  
                  <div>
                    <label className="text-xs font-bold text-gray-500 block mb-2">头像颜色</label>
                    <div className="flex gap-2 flex-wrap">
                      {MEMBER_COLORS.map(color => (
                        <button 
                          key={color.id}
                          type="button"
                          onClick={() => setMemberInput({...memberInput, color: color.id})}
                          className={`w-10 h-10 rounded-full flex items-center justify-center transition-all ${memberInput.color === color.id ? 'ring-2 ring-offset-2 ring-indigo-500 scale-110' : ''}`}
                          style={{ backgroundColor: color.hex }}
                        >
                          {memberInput.color === color.id && <Icons.Check size={16} className="text-white"/>}
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
                
                <div className="flex gap-3 mt-6">
                  <button 
                    onClick={() => { setShowMemberForm(false); setEditingMember(null); }} 
                    className="flex-1 py-3 rounded-xl bg-gray-100 font-bold text-sm"
                  >
                    取消
                  </button>
                  {editingMember && editingMember.id !== 'default' && members.length > 1 && (
                    <button 
                      onClick={() => { 
                        if (confirm(`确定要删除成员「${editingMember.name}」吗？该成员的所有数据将被清除。`)) {
                          deleteMember(editingMember.id); 
                          setShowMemberForm(false); 
                          setEditingMember(null); 
                        }
                      }} 
                      className="px-4 py-3 rounded-xl bg-rose-100 text-rose-600 font-bold text-sm"
                    >
                      <Icons.Trash2 size={16}/>
                    </button>
                  )}
                  <button 
                    onClick={() => editingMember ? updateMember() : addMember()} 
                    className="flex-1 py-3 rounded-xl bg-indigo-600 text-white font-bold text-sm disabled:opacity-50"
                    disabled={!memberInput.name.trim()}
                  >
                    {editingMember ? '保存' : '添加'}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Print Preview Modal */}
          {showPrintPreview && (
            <div className="absolute inset-0 z-[90] bg-white flex flex-col">
              <div className="p-4 border-b flex justify-between items-center bg-indigo-600 text-white">
                <button onClick={() => setShowPrintPreview(false)} className="p-2 bg-indigo-500 rounded-full"><Icons.X size={20}/></button>
                <h3 className="font-bold">报告预览</h3>
                <div className="w-10"/>
              </div>
              <div className="flex-1 overflow-y-auto p-4 bg-white">
                <div dangerouslySetInnerHTML={{__html: printHtml}} style={{fontFamily: '-apple-system, BlinkMacSystemFont, sans-serif', color: '#1e293b'}}/>
              </div>
              <div className="p-4 border-t bg-gray-50 flex gap-3">
                <button onClick={() => setShowPrintPreview(false)} className="flex-1 py-3 bg-gray-200 text-gray-700 rounded-xl font-bold text-sm">关闭</button>
                <button onClick={() => {
                  var el = document.createElement('textarea');
                  el.value = '📊 健康趋势分析报告\n' + '时间段: ' + trendRange.start + ' 至 ' + trendRange.end + '\n指标: ' + selectedTrendItems.join('、');
                  document.body.appendChild(el);
                  el.select();
                  document.execCommand('copy');
                  document.body.removeChild(el);
                  alert('报告摘要已复制到剪贴板!\n\n提示:您可以截图保存完整报告');
                }} className="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold text-sm">复制摘要</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
